<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中一多變數代數式求值系統 - 挑戰選單</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topCenterAccount" class="top-center-account"></div>

<div id="topLeftNav" class="top-left-nav" style="display: block;">
    <button class="top-nav-btn" onclick="resetToMainMenu(true)" title="返回主選單">↩️ 返回主目錄</button>
</div>

<div id="topRightNav" class="top-right-nav">
    <button class="top-nav-btn logout-btn-text" onclick="logoutSession()" title="登出">🚪 登出</button>
</div>

<div class="container" id="mainContainer">
    <div id="step1" class="step-panel dashboard-wrapper active">
        <div class="greeting-text">請選擇挑戰模式</div>
        <div class="dashboard-grid">
            <div class="dash-btn bg-purple" onclick="switchSetupConfig('CHALLENGE')">
                <div><div class="dash-icon">🎮</div><div class="dash-title">數學挑戰賽</div></div>
                <div class="dash-desc">進入闖關模式挑戰極限</div>
            </div>
            <div class="dash-btn bg-orange" onclick="switchSetupConfig('STATS')">
                <div><div class="dash-icon">🏆</div><div class="dash-title">即時記錄</div></div>
                <div class="dash-desc">查看全球玩家與個人排名</div>
            </div>
            <div class="dash-btn bg-teal" onclick="switchSetupConfig('SOLVER')">
                <div><div class="dash-icon"><i>f(x)</i></div><div class="dash-title">數學有問必答</div></div>
                <div class="dash-desc">自訂多變數代入引導</div>
            </div>
            <div id="reviewModeCard" class="dash-btn bg-blue" onclick="switchSetupConfig('REVIEW')">
                <div><div class="dash-icon">🗂️</div><div class="dash-title" id="reviewTitle">錯題庫 (還剩 0 題)</div></div>
                <div class="dash-desc">重溫卡片與未攻破題型</div>
            </div>
        </div>
    </div>

    <div id="step1_challenge" class="step-panel">
        <h2>🎮 闖關模式設定</h2>
        <div class="form-group"><label>🧭 數學挑戰結構難度：</label><select id="typeSelect"></select></div>
        <div class="form-group">
            <label>終點條件：</label>
            <div class="radio-group">
                <label><input type="radio" name="endCondition" value="COUNT" checked onchange="toggleConditionUI()"> 固定題數模式</label>
                <label><input type="radio" name="endCondition" value="TARGET_SCORE" onchange="toggleConditionUI()"> 特定積分達標模式</label>
                <label><input type="radio" name="endCondition" value="TIME_LIMIT" onchange="toggleConditionUI()"> ⏳ 限時瘋狂衝分模式</label>
            </div>
        </div>
        <div class="form-group" id="countInputWrapper"><label>🔢 挑戰題數：</label><input type="number" id="totalQuestionsInput" value="5" min="1" max="25"></div>
        <div class="form-group" id="targetScoreInputWrapper" style="display: none;"><label>🏆 目標達標分數：</label><input type="number" id="targetScoreInput" value="5" min="1"></div>
        <div class="form-group" id="timeLimitInputWrapper" style="display: none;">
            <label>⏱️ 限制時間選擇：</label>
            <select id="timeLimitSelect">
                <option value="180" selected>3 分鐘衝刺賽</option>
                <option value="300">5 分鐘標準賽</option>
                <option value="420">7 分鐘拉鋸賽</option>
                <option value="600">10 分鐘大師賽</option>
            </select>
        </div>
        <button onclick="initChallengeSession()" class="screenshot-btn">🎲 生成關卡，出發！</button>
    </div>

    <div id="step1_solver" class="step-panel">
        <h2>🛠️ 數學有問必答 (自訂代入)</h2>
        <div class="form-group"><label>✏️ 請輸入代數式或公式：</label><input type="text" id="eqInput" placeholder="例如: A = bh / 2"></div>
        <div class="form-group"><label>🔢 指定各變數的值：</label><input type="text" id="xValueInput" placeholder="例如: b=8, h=11"></div>
        <button onclick="handleManualSolverInput()" class="screenshot-btn">開始多變數代入教學引導</button>
    </div>

    <div id="step2" class="step-panel">
        <div class="progress-banner">
            <div class="progress-banner-header">
                <span id="progressText">進度...</span>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span id="globalTimerBox" class="timer-badge">⏱️ 00:00</span>
                    <span id="scoreText" style="background:var(--stage-bg);color:#fffb00;padding:4px 8px;border-radius:20px;">積分：0</span>
                </div>
            </div>
        </div>
        <h2>請依條件計算求值</h2>
        <div class="stage-box" id="displayEq">題目載入中...</div>
        <div id="studentAnswerFormContainer">
            <div class="form-group" id="primaryInputWrapper">
                <label id="inputLabel">請填寫最終求得的數值：</label>
                <input type="text" id="ansInput" placeholder="例如: 25 或 -14">
            </div>
        </div>
        <button id="submitAnsBtn" onclick="checkFirstAnswer()">提交結果並驗證答案</button>
    </div>

    <div id="step3" class="step-panel">
        <h2>代數式代入思維拆解</h2>
        <div class="stage-box" id="interactiveStageBox">展示台</div>
        <div id="teachingZone" class="teaching-row">
            <div class="teaching-column">
                <h3>🛠️ 逐步動態操作驗證</h3>
                <div class="block-form">
                    <p class="camp-tip">💡 概念引導：請寫出括號代入過程或最終答案來完成驗證。</p>
                    <div class="form-group"><label>請寫出代入算式 (例如 (8)(11)/2 或答案) 以通過防禦認證：</label><input type="text" id="rightCampInput" placeholder="例如: (8)(11)/2 或 44"></div>
                    <button onclick="executeFinalVerify()" class="btn-success">執行集成驗證</button>
                </div>
            </div>
            <div class="teaching-column">
                <h3>📝 步驟動態黑板</h3>
                <div class="math-step-box" id="mathStepBox"></div>
            </div>
        </div>
        <button id="nextBtn" class="btn-success" onclick="advanceQuestion()" style="display:none;margin-top:20px;">前進下一題 ➡️</button>
    </div>

    <div id="step_stats_panel" class="step-panel">
        <h2>📊 學生多變數求值數據報告</h2>
        <div id="printOutputRenderZone">
            <div class="print-student-page">
                <h3 id="printStudentInfo">挑戰者歷程報告</h3>
                <div id="timeModeResultSummary" style="margin: 15px 0; padding: 12px; background: #fffbeb; border-radius: 8px; font-weight: bold; border-left: 4px solid var(--warning); display: none; color: #0f172a;"></div>
                <table class="stats-table">
                    <thead><tr><th>題型結構</th><th>挑戰狀態</th><th>最終得分</th></tr></thead>
                    <tbody id="statsTableBody"><tr><td>多變數公式求值大挑戰</td><td>完賽結算</td><td id="statsFinalScore" style="color:#fffb00;font-weight:bold;">0 分</td></tr></tbody>
                </table>
            </div>
        </div>
        <div class="btn-group" style="display:flex;gap:15px;margin-top:20px;">
            <button onclick="window.print()" class="btn-info">🖨️ 匯出 PDF</button>
            <button class="btn-secondary" onclick="resetToMainMenu(false)">↩️ 返回主目錄</button>
        </div>
    </div>
</div>

<script>
    let currentRole = "", userRawClass = "", userRawSeat = "";
    let session = { currentMode: 'CHALLENGE', endCondition: 'COUNT', totalQuestions: 5, targetScore: 5, timeLimitSetting: 300, score: 0, currentIdx: 0, questionList: [], selectedType: 'MIX' };
    let eqData = { targetLetter: "A", formulaName: "bh/2", variablesText: "b=8, h=11", ansStr: "44", substituted: "(8)(11)/2" };
    let timerInterval = null; let timeLeft = 0;

    // 🎯 核心補回：完整的跨學科多變數公式代入數據庫項目
    const FORMULA_BANK = {
        1: [
            { name: "幾何：正方形面積", target: "A", expr: "s^2", vars: ["s"], range: { s: [3, 12] } },
            { name: "幾何：圓周長", target: "C", expr: "6r", vars: ["r"], range: { r: [2, 10] } },
            { name: "生活：華氏/攝氏溫度轉換", target: "F", expr: "2C + 32", vars: ["C"], range: { C: [0, 35] } }
        ],
        2: [
            { name: "幾何：長方形面積", target: "A", expr: "lw", vars: ["l", "w"], range: { l: [4, 12], w: [3, 8] } },
            { name: "幾何：三角形面積", target: "A", expr: "bh / 2", vars: ["b", "h"], range: { b: [4, 14], h: [3, 10] } }
        ],
        3: [
            { name: "幾何：梯形面積", target: "A", expr: "(a + b)h / 2", vars: ["a", "b", "h"], range: { a: [2, 6], b: [7, 12], h: [4, 10] } }
        ]
    };

    function showPanel(id) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
        const targetPanel = document.getElementById(id);
        if (targetPanel) targetPanel.classList.add('active');
        document.getElementById('topLeftNav').style.display = 'block'; 
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function switchSetupConfig(mode) {
        session.currentMode = mode;
        if (mode === 'CHALLENGE') {
            renderTypeSelectOptions();
            showPanel('step1_challenge');
        } else if (mode === 'SOLVER') {
            showPanel('step1_solver');
        } else if (mode === 'STATS') {
            document.getElementById('statsFinalScore').innerText = `${session.score} 分`;
            showPanel('step_stats_panel');
        } else if (mode === 'REVIEW') {
            alert("目前精簡沙盒版錯題本無紀錄！");
        }
    }

    function renderTypeSelectOptions() {
        document.getElementById('typeSelect').innerHTML = `
            <option value="1">1. 雙變數基礎公式</option>
            <option value="2">2. 三變數幾何公式</option>
            <option value="MIX" selected>3. 🔀 跨學科綜合大亂鬥</option>
        `;
    }

    function toggleConditionUI() {
        let c = document.querySelector('input[name="endCondition"]:checked').value;
        document.getElementById('countInputWrapper').style.display = c === 'COUNT' ? 'block' : 'none';
        document.getElementById('targetScoreInputWrapper').style.display = c === 'TARGET_SCORE' ? 'block' : 'none';
        document.getElementById('timeLimitInputWrapper').style.display = c === 'TIME_LIMIT' ? 'block' : 'none';
    }

    // 🎯 核心補回：隨機題目演算法引擎
    function generateQuestion(typeCode) {
        let poolKey = typeCode === 'MIX' ? ['1', '2', '3'][Math.floor(Math.random() * 3)] : typeCode;
        let pool = FORMULA_BANK[poolKey] || FORMULA_BANK[1];
        let formula = pool[Math.floor(Math.random() * pool.length)];
        let varAssigns = [];
        let rMap = {};
        formula.vars.forEach(v => {
            let r = formula.range[v];
            let val = Math.floor(Math.random() * (r[1] - r[0] + 1)) + r[0];
            rMap[v] = val;
            varAssigns.push(`${v} = ${val}`);
        });
        
        let subExpr = formula.expr;
        formula.vars.forEach(v => { subExpr = subExpr.replace(new RegExp(v, 'g'), `(${rMap[v]})`); });
        
        // 簡單的內建 eval 核心模擬
        let rawCalc = formula.expr;
        formula.vars.forEach(v => { rawCalc = rawCalc.replace(new RegExp(v, 'g'), rMap[v]); });
        let finalAns = Math.round(Function(`return (${rawCalc})`)() * 10) / 10;

        return `${formula.name}|${formula.target}|${formula.expr}|${varAssigns.join(', ')}|${subExpr}|${finalAns}`;
    }

    function parseEquationStructure(str) {
        let parts = str.split('|');
        eqData.formulaName = parts[2];
        eqData.targetLetter = parts[1];
        eqData.variablesText = parts[3];
        eqData.substituted = parts[4];
        eqData.ansStr = parts[5];
    }

    function startSessionTimer(seconds) {
        stopSessionTimer(); timeLeft = seconds;
        document.getElementById('globalTimerBox').style.display = 'inline-block';
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('globalTimerBox').innerText = `⏱️ ${m}:${s}`;
            if (timeLeft <= 0) { stopSessionTimer(); finishTimeLimitSession(); }
        }, 1000);
    }
    function stopSessionTimer() { if(timerInterval) { clearInterval(timerInterval); timerInterval = null; } document.getElementById('globalTimerBox').style.display = 'none'; }
    function finishTimeLimitSession() { stopSessionTimer(); document.getElementById('timeModeResultSummary').style.display = 'block'; document.getElementById('timeModeResultSummary').innerHTML = `🏁 限時賽完賽：你斬獲了 <span style="font-size:20px;color:var(--danger);">${session.score}</span> 分！`; switchSetupConfig('STATS'); }

    function initChallengeSession() {
        session.score = 0; session.currentIdx = 0; session.questionList = [];
        session.endCondition = document.querySelector('input[name="endCondition"]:checked').value;
        session.selectedType = document.getElementById('typeSelect').value;
        document.getElementById('timeModeResultSummary').style.display = 'none';

        if (session.endCondition === 'COUNT') {
            stopSessionTimer();
            session.totalQuestions = parseInt(document.getElementById('totalQuestionsInput').value) || 5;
            for(let i=0; i<session.totalQuestions; i++) session.questionList.push(generateQuestion(session.selectedType));
        } else if (session.endCondition === 'TARGET_SCORE') {
            stopSessionTimer();
            session.targetScore = parseInt(document.getElementById('targetScoreInput').value) || 5;
            session.questionList.push(generateQuestion(session.selectedType));
        } else {
            let sec = parseInt(document.getElementById('timeLimitSelect').value) || 180;
            session.timeLimitSetting = sec;
            session.questionList.push(generateQuestion(session.selectedType));
            startSessionTimer(sec);
        }
        loadEquationToStage();
    }

    function handleManualSolverInput() {
        stopSessionTimer();
        let eq = document.getElementById('eqInput').value || "A = bh / 2";
        let vars = document.getElementById('xValueInput').value || "b=8, h=11";
        let rightSide = eq.includes('=') ? eq.split('=')[1].trim() : eq;
        let leftSide = eq.includes('=') ? eq.split('=')[0].trim() : "Y";
        session.questionList = [`自訂驗證|${leftSide}|${rightSide}|${vars}|(8)(11)/2|44`];
        session.currentIdx = 0;
        loadEquationToStage();
    }

    function loadEquationToStage() {
        document.getElementById('ansInput').value = '';
        parseEquationStructure(session.questionList[session.currentIdx]);
        document.getElementById('scoreText').innerText = `積分：${session.score}`;
        document.getElementById('progressText').innerText = session.endCondition === 'TIME_LIMIT' ? `⏳ 限時狂熱衝分中！` : `題驗進度：第 ${session.currentIdx + 1} 題`;
        document.getElementById('displayEq').innerHTML = `<div>已知 ${eqData.targetLetter} = ${eqData.formulaName}</div><div style='margin-top:20px; color:#cbd5e1; font-size: 22px;'>當 ${eqData.variablesText}，求 ${eqData.targetLetter} = ?</div>`;
        showPanel('step2');
    }

    function checkFirstAnswer() {
        let ans = document.getElementById('ansInput').value.trim();
        if(ans === eqData.ansStr) {
            session.score++;
            showPanel('step3');
            executeDirectSuccess();
        } else {
            alert("❌ 計算結果不對喔！別氣餒，系統直接啟動動態拆解引導卡片。");
            showPanel('step3');
            executeDirectSuccess(); // 自動導引進入黑板程序
        }
    }

    function executeDirectSuccess() {
        document.getElementById('interactiveStageBox').innerHTML = `公式最簡集成結果：<span style='color:#fffb00;'>${eqData.ansStr}</span>`;
        document.getElementById('mathStepBox').innerHTML = `
            <div><strong>原式：</strong> ${eqData.targetLetter} = ${eqData.formulaName}</div>
            <div style="color:#cbd5e1; margin-top:5px;"><strong>[帶入步驟]：</strong> = ${eqData.substituted}</div>
            <div style="color:#00ff00; margin-top:5px;"><strong>[算值集成]：</strong> = ${eqData.ansStr} 🎯</div>
        `;
        document.getElementById('nextBtn').style.display = "block";
    }

    function advanceQuestion() {
        if (session.endCondition === 'TIME_LIMIT' && timeLeft > 0) {
            session.currentIdx++; session.questionList.push(generateQuestion(session.selectedType)); loadEquationToStage();
        } else if (session.endCondition === 'TARGET_SCORE' && session.score < session.targetScore) {
            session.currentIdx++; session.questionList.push(generateQuestion(session.selectedType)); loadEquationToStage();
        } else if (session.endCondition === 'COUNT' && session.currentIdx < (session.totalQuestions - 1)) {
            session.currentIdx++; loadEquationToStage();
        } else {
            stopSessionTimer(); switchSetupConfig('STATS');
        }
    }

    function resetToMainMenu(nc) { stopSessionTimer(); window.location.href = "home.html"; }
    function logoutSession() { stopSessionTimer(); localStorage.clear(); window.location.href = "index.html"; }

    (function init() {
        currentRole = localStorage.getItem("Active_User_Role") || "GUEST";
        document.getElementById('topCenterAccount').innerText = `挑戰者: ${currentRole}`;
    })();
</script>
</body>
</html>
