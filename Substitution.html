<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中一多變數代數式求值系統</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: url("https://i.imgur.com/f118Qxn.jpeg") no-repeat center center fixed; 
            background-size: cover; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; box-sizing: border-box; 
        }
        
        /* 置頂導航高層級防禦 */
        .top-left-nav, .top-right-nav { position: absolute; top: 25px; z-index: 999 !important; }
        .top-left-nav { left: 20px; } 
        .top-right-nav { right: 20px; }
        .top-center-account { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); font-size: 20px; font-weight: 900; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); z-index: 999 !important; font-family: 'Comic Sans MS', sans-serif; white-space: nowrap; }
        .top-nav-btn { background: #fff; border: 2px solid #cbd5e1; padding: 8px 16px; border-radius: 12px; font-weight: bold; color: #475569; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .top-nav-btn:hover { transform: scale(1.03); border-color: #3b82f6; color: #3b82f6; }
        
        .container { max-width: 900px; width: 100%; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.25); padding: 30px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15); box-sizing: border-box; margin-top: 60px; }
        
        h2 { text-align: center; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); }
        .step-panel { display: none; } 
        .step-panel.active { display: block; }
        
        .form-group { margin-bottom: 24px; width: 100%; box-sizing: border-box; }
        label { display: block; margin-bottom: 12px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.9); font-size: 16px; box-sizing: border-box; color: #000; }
        
        button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); } 
        .btn-success { background: #10b981; } 
        .btn-warning { background: #f59e0b; color:#111; } 
        .btn-secondary { background: #64748b; margin-top:15px; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .dash-btn { border-radius: 20px; padding: 20px; color: white; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 120px; transition: transform 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .dash-btn:hover { transform: translateY(-4px); }
        .bg-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); } 
        .bg-orange { background: linear-gradient(135deg, #f59e0b, #fcd34d); } 
        .bg-teal { background: linear-gradient(135deg, #0d9488, #2dd4bf); } 
        .bg-blue { background: linear-gradient(135deg, #0284c7, #38bdf8); }
        
        .stage-box { background: #0f172a; border-radius: 16px; padding: 25px; margin: 20px 0; color: white; text-align: center; font-size: 26px; font-weight: bold; border: 1px solid rgba(255,255,255,0.15); min-height: 100px; display:flex; align-items:center; justify-content:center; }
        .progress-banner { display:flex; justify-content:space-between; background:rgba(0,0,0,0.4); padding:10px 20px; border-radius:12px; color:#fff; font-weight:bold; margin-bottom:20px; }
    </style>
</head>
<body>

<div id="topLeftNav" class="top-left-nav">
    <button id="navBackBtn" class="top-nav-btn" onclick="handleNavigationBack()">&lt; 返回學習大廳</button>
</div>
<div id="topCenterAccount" class="top-center-account"></div>
<div id="topRightNav" class="top-right-nav">
    <button class="top-nav-btn" style="color:#ef4444;" onclick="logoutSession()">🚪 登出</button>
</div>

<!-- 備用防線：無快取時才會啟用，有快取時會自動 display: none -->
<div id="step0_login" class="step-panel" style="width:100%; max-width:400px; margin-top:100px; display: none;">
    <div style="background:rgba(255,255,255,0.12); backdrop-filter:blur(14px); padding:40px; border-radius:16px; border:1px solid rgba(255,255,255,0.2);">
        <h2 style="margin-top:0;">連線驗證中</h2>
        <div class="form-group"><label>班別</label><select id="loginClass"></select></div>
        <div class="form-group"><label>學號</label><select id="loginSeat"></select></div>
        <button onclick="loginStudent()">進入模組</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="step1" class="step-panel dashboard-wrapper active">
        <h2 style="text-align:left; margin-top:0;">請選擇挑戰模式</h2>
        <div class="dashboard-grid">
            <div class="dash-btn bg-purple" onclick="switchSetupConfig('CHALLENGE')">
                <div><h2>🎮 數學挑戰賽</h2></div><div style="font-size:14px;opacity:0.9;">進入闖關模式挑戰極限</div>
            </div>
            <div class="dash-btn bg-orange" onclick="switchSetupConfig('STATS')">
                <div><h2>🏆 即時記錄</h2></div><div style="font-size:14px;opacity:0.9;">查看挑戰數據</div>
            </div>
            <div class="dash-btn bg-teal" onclick="switchSetupConfig('SOLVER')">
                <div><h2><i>f(x)</i> 有問必答</h2></div><div style="font-size:14px;opacity:0.9;">自訂多變數代入引導</div>
            </div>
            <div id="reviewModeCard" class="dash-btn bg-blue" onclick="switchSetupConfig('REVIEW')">
                <div><h2 id="reviewTitle">🗂️ 錯題庫</h2></div><div style="font-size:14px;opacity:0.9;">重溫未攻破題型</div>
            </div>
        </div>
    </div>

    <div id="step1_challenge" class="step-panel">
        <h2>🎮 闖關模式設定</h2>
        <div class="form-group"><label>🧭 數學挑戰結構難度：</label><select id="typeSelect"></select></div>
        <div class="form-group" style="background:rgba(255,255,255,0.8); padding:10px; border-radius:8px; display:flex; gap:15px; color:#000; font-weight:bold;">
            <label style="color:#000; text-shadow:none; margin:0;"><input type="radio" name="endCondition" value="COUNT" checked onchange="toggleConditionUI()"> 固定題數</label>
            <label style="color:#000; text-shadow:none; margin:0;"><input type="radio" name="endCondition" value="TIME_LIMIT" onchange="toggleConditionUI()"> 限時衝分</label>
        </div>
        <div class="form-group" id="countInputWrapper"><label>🔢 挑戰題數：</label><input type="number" id="totalQuestionsInput" value="5" min="1" max="25" autocomplete="off"></div>
        <div class="form-group" id="timeLimitInputWrapper" style="display:none;"><label>⏱️ 限制時間選擇：</label>
            <select id="timeLimitSelect"><option value="180">3 分鐘</option><option value="300" selected>5 分鐘</option></select>
        </div>
        <button onclick="initChallengeSession()" class="btn-success">🎲 生成關卡，出發！</button>
    </div>

    <div id="step2" class="step-panel">
        <div class="progress-banner"><span id="progressText">進度...</span><span id="scoreText" style="color:#fffb00;">積分：0</span></div>
        <h2>請依條件計算求值</h2>
        <div class="stage-box" id="displayEq">題目載入中...</div>
        <div class="form-group">
            <label>請填寫最終求得的數值（負數請加負號）：</label>
            <input type="text" id="ansInput" placeholder="例如: 25 或 -14" autocomplete="off">
        </div>
        <button onclick="checkFirstAnswer()">提交結果並驗證</button>
    </div>

    <div id="step3" class="step-panel">
        <h2>代數式代入思維拆解</h2>
        <div class="stage-box" id="interactiveStageBox">展示台</div>
        <button class="btn-warning" onclick="startInteractiveSolving()">啟動隱形括號逐步破譯教學</button>
        <button class="btn-success" onclick="advanceQuestion()" style="margin-top:15px;">前進下一題 ➡️</button>
    </div>

    <div id="step_stats_panel" class="step-panel">
        <h2>📊 多變數求值數據報告</h2>
        <div style="background:#fff; color:#000; padding:20px; border-radius:16px; margin:20px 0; text-align:center;">
            <h3>歷程結算與錯題總結</h3>
            <p>數據同步完成。</p>
        </div>
        <button class="btn-secondary" onclick="resetToMainMenu()">↩️ 返回主目錄</button>
    </div>
</div>

<!-- 🌟 核心修復：嚴格包覆在完整的 script 標籤內部，絕不外漏 -->
<script>
    let currentPanelId = "step1";
    let currentRole = "STUDENT", userRawClass = "", userRawSeat = "";
    let cacheStorage = { EQ: { wrongBook: [], stats: getInitialStatsObject() } };
    let session = { currentMode: 'CHALLENGE', endCondition: 'COUNT', totalQuestions: 5, timeLimitSetting: 300, score: 0, currentIdx: 0, questionList: [], selectedType: 'MIX' };

    document.addEventListener('DOMContentLoaded', function() {
        try {
            let cHtml="", sHtml="";
            for(let g=1;g<=6;g++) ['A','B','C','D'].forEach(l => cHtml+=`<option value="${g}${l}">${g}${l} 班</option>`);
            for(let i=1;i<=35;i++) sHtml+=`<option value="${i}">${i} 號</option>`;
            if(document.getElementById('loginClass')) document.getElementById('loginClass').innerHTML=cHtml;
            if(document.getElementById('loginSeat')) document.getElementById('loginSeat').innerHTML=sHtml;
            renderTypeSelectOptions();
            
            checkActiveSession();
        } catch(e) { console.error("Init Error", e); }
    });

    function checkActiveSession() {
        let savedRole = localStorage.getItem("Active_User_Role");
        let savedClass = localStorage.getItem("Active_User_Class");
        let savedSeat = localStorage.getItem("Active_User_Seat");
        
        let loginPanel = document.getElementById('step0_login');
        let mainBox = document.getElementById('mainContainer');
        let accountDOM = document.getElementById('topCenterAccount');
        
        if (!savedRole) { 
            if(loginPanel) { loginPanel.classList.add('active'); loginPanel.style.display = 'block'; }
            if(mainBox) mainBox.style.display = 'none';
            return; 
        }

        if(loginPanel) { loginPanel.classList.remove('active'); loginPanel.style.display = 'none'; }
        if(mainBox) mainBox.style.display = 'block';
        if(accountDOM) accountDOM.style.display = 'block';

        if (savedRole === "GUEST") {
            currentRole = "GUEST"; userRawClass = "GUEST"; userRawSeat = "VISITOR";
            accountDOM.innerText = `挑戰者: 訪客體驗`;
        } else if (savedRole === "STUDENT" || (savedClass && savedSeat)) {
            currentRole = "STUDENT"; userRawClass = savedClass || "1A"; userRawSeat = savedSeat || "1";
            accountDOM.innerText = `挑戰者: ${userRawClass}班${String(userRawSeat).padStart(2, '0')}號`;
        } else if (savedRole === "TEACHER") {
            currentRole = "TEACHER"; accountDOM.innerText = `管理員後台`;
        }
        
        showPanel('step1');
    }

    function renderTypeSelectOptions() {
        let ts = document.getElementById('typeSelect');
        if(ts) ts.innerHTML = `<option value="1">1. 雙變數公式求值</option><option value="2">2. 三變數公式求值</option><option value="MIX" selected>3. 🔀 跨學科公式混合</option>`;
    }

    function toggleConditionUI() {
        let c = document.querySelector('input[name="endCondition"]:checked').value;
        document.getElementById('countInputWrapper').style.display = c==='COUNT' ? 'block' : 'none';
        document.getElementById('timeLimitInputWrapper').style.display = c==='TIME_LIMIT' ? 'block' : 'none';
    }

    function showPanel(id) { 
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active')); 
        const targetPanel = document.getElementById(id);
        if (targetPanel) targetPanel.classList.add('active'); 
        currentPanelId = id;
        
        if (id !== 'step0_login') { let lb = document.getElementById('step0_login'); if(lb) lb.style.display = 'none'; }
        
        const navBtn = document.getElementById('navBackBtn');
        if (navBtn) navBtn.innerText = (id === 'step1') ? "← 返回學習大廳" : "← 返回主目錄";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleNavigationBack() {
        if (currentPanelId === 'step1') window.location.replace("home.html");
        else showPanel('step1');
    }
    
    function switchSetupConfig(configMode) {
        if (configMode === 'CHALLENGE') showPanel('step1_challenge');
        else if (configMode === 'STATS') showPanel('step_stats_panel');
        else if (configMode === 'SOLVER') showPanel('step1_solver');
    }

    function getInitialStatsObject() { return { 1:{total:0}, 2:{total:0}, 3:{total:0}, 4:{total:0} }; }
    function logoutSession() { if(confirm("確定登出系統嗎？")) { localStorage.clear(); window.location.replace("index.html"); } }
    function resetToMainMenu() { window.location.replace("home.html"); }
    function initChallengeSession() { showPanel('step2'); }
    function checkFirstAnswer() { showPanel('step3'); }
    function startInteractiveSolving() { alert("啟動拆解黑板！"); }
    function advanceQuestion() { showPanel('step_stats_panel'); }
</script>
</body>
</html>
