<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中一多變數代數式求值系統</title>
    <style>
        :root { 
            --primary: #3b82f6; 
            --success: #10b981; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --glass-bg: rgba(255, 255, 255, 0.12); 
            --glass-border: 1px solid rgba(255, 255, 255, 0.25); 
            --glass-blur: blur(14px); 
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: url("https://i.imgur.com/f118Qxn.jpeg") no-repeat center center fixed; 
            background-size: cover; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; box-sizing: border-box; 
        }
        
        /* 導航列最高階層防禦 - 確保全局唯一 */
        .top-left-nav, .top-right-nav { position: absolute; top: 25px; z-index: 999 !important; }
        .top-left-nav { left: 20px; } 
        .top-right-nav { right: 20px; }
        .top-center-account { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); font-size: 20px; font-weight: 900; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); z-index: 999 !important; font-family: 'Comic Sans MS', sans-serif; white-space: nowrap; display: none; }
        
        .top-nav-btn { background: #fff; border: 2px solid #cbd5e1; padding: 8px 16px; border-radius: 12px; font-weight: bold; color: #475569; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .top-nav-btn:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.03); }
        .logout-btn-text { color: var(--danger); border-color: #fecdd3; }
        .logout-btn-text:hover { background: #fff1f2; }

        .container { max-width: 900px; width: 100%; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); padding: 30px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15); box-sizing: border-box; margin-top: 60px; }
        
        h2 { text-align: center; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); }
        .step-panel { display: none; } 
        .step-panel.active { display: block; }
        
        .form-group { margin-bottom: 24px; width: 100%; box-sizing: border-box; }
        label { display: block; margin-bottom: 12px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.9); font-size: 16px; box-sizing: border-box; color:#000 !important; font-weight: bold !important; }
        
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); opacity: 0.9; } 
        .btn-success { background: var(--success); } 
        .btn-warning { background: var(--warning); color:#111; } 
        .btn-secondary { background: #64748b; margin-top:15px; } .btn-info { background: #06b6d4; } .btn-purple { background: #8b5cf6; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .dash-btn { border-radius: 20px; padding: 20px; color: white; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 120px; transition: transform 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .dash-btn:hover { transform: translateY(-4px); }
        
        .bg-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); } 
        .bg-orange { background: linear-gradient(135deg, #f59e0b, #fcd34d); } 
        .bg-teal { background: linear-gradient(135deg, #0d9488, #2dd4bf); } 
        .bg-blue { background: linear-gradient(135deg, #0284c7, #38bdf8); }
        
        .stage-box { background: #0f172a; border-radius: 16px; padding: 30px 25px; margin: 20px 0; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.15); min-height: 120px; box-shadow: inset 0 4px 10px rgba(0,0,0,0.5); }
        
        .formula-row { font-size: 26px; font-weight: 800; color: #ffffff; display: flex; justify-content: center; align-items: center; gap: 4px; margin-bottom: 20px; width: 100%; text-align: center; line-height: 1.4; }
        .condition-row { font-size: 22px; font-weight: bold; color: #fffb00; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.15); width: 100%; text-align: center; }

        .progress-banner { display:flex; justify-content:space-between; background:rgba(0,0,0,0.4); padding:10px 20px; border-radius:12px; color:#fff; font-weight:bold; margin-bottom:20px; }
        
        .math-fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; padding: 0 8px; position: relative; margin: 0 4px; }
        .fraction-numerator { border-bottom: 2px solid white; padding-bottom: 2px; text-align: center; width: 100%; font-size: 24px; font-family: monospace; }
        .fraction-denominator { text-align: center; width: 100%; padding-top: 2px; font-size: 24px; font-family: monospace; }

        /* 羅坤山老師系統數據整合高級樣式 */
        table.stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; background: rgba(255,255,255,0.95); color: #334155; border-radius: 12px; overflow: hidden; }
        table.stats-table th, table.stats-table td { border: 1px solid #cbd5e1; padding: 10px; text-align: center; }
        table.stats-table th { background: #e2e8f0; color: #1e293b; font-weight: bold; }
        table.stats-table tr.section-title th { background: #2b5797 !important; color: white !important; text-align: left; padding-left: 15px; font-size: 15px; }
        .info-span { margin-right: 25px; display: inline-block; font-weight: bold; }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }

        /* 全班整合列印強制斷頁機制 */
        .print-student-page { display: block; }
        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; }
            .container { max-width: 100% !important; margin: 0 !important; box-shadow: none !important; }
            .top-left-nav, .top-right-nav, .non-print, button, .dash-btn { display: none !important; }
            .step-panel { display: none !important; }
            #step_stats_panel { display: block !important; background: transparent !important; border: none !important; }
            .print-student-page { page-break-after: always; page-break-inside: avoid; color: black !important; }
            .print-student-page:last-child { page-break-after: avoid; }
            table.stats-table { background: white !important; color: black !important; }
            table.stats-table th { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #f1f5f9 !important; }
            table.stats-table tr.section-title th { background: #2b5797 !important; color: white !important; }
        }
    </style>
</head>
<body>

<div id="topLeftNav" class="top-left-nav">
    <button id="navBackBtn" class="top-nav-btn" onclick="handleNavigationBack()">&lt; 返回學習大廳</button>
</div>
<div id="topCenterAccount" class="top-center-account"></div>
<div id="topRightNav" class="top-right-nav">
    <button class="top-nav-btn logout-btn-text" onclick="logoutSession()">🚪 登出</button>
</div>

<div class="container" id="mainContainer">
    
    <!-- 主選單目錄 -->
    <div id="step1" class="step-panel dashboard-wrapper active">
        <h2 style="text-align:left; margin-top:0;">請選擇挑戰模式</h2>
        <div class="dashboard-grid">
            <div class="dash-btn bg-purple" onclick="switchSetupConfig('CHALLENGE')">
                <div><h2>🎮 中學公式挑戰賽</h2></div><div style="font-size:14px;opacity:0.9;">探索跨課題幾何與代數公式求值</div>
            </div>
            <div class="dash-btn bg-orange" onclick="switchSetupConfig('STATS')">
                <div><h2>🏆 學習數據報告</h2></div><div style="font-size:14px;opacity:0.9;">查閱多變數求值歷程數據報告</div>
            </div>
            <div class="dash-btn bg-teal" onclick="switchSetupConfig('SOLVER')">
                <div><h2><i>f(x)</i> 有問必答</h2></div><div style="font-size:14px;opacity:0.9;">自訂多變數求值引導</div>
            </div>
            <div id="reviewModeCard" class="dash-btn bg-blue" onclick="switchSetupConfig('REVIEW')">
                <div><h2 id="reviewTitle">🗂️ 錯題庫 (0)</h2></div><div style="font-size:14px;opacity:0.9;">溫習未攻破題型</div>
            </div>
        </div>
    </div>

    <!-- 闖關設定面板 -->
    <div id="step1_challenge" class="step-panel">
        <h2>🎮 闖關模式設定</h2>
        <div class="form-group"><label>🧭 選擇公式結構維度：</label><select id="typeSelect"></select></div>
        <div class="form-group" style="background:rgba(255,255,255,0.8); padding:10px; border-radius:8px; display:flex; gap:15px; color:#000; font-weight:bold;">
            <label style="color:#000; text-shadow:none; margin:0;"><input type="radio" name="endCondition" value="COUNT" checked onchange="toggleConditionUI()"> 固定題數</label>
            <label style="color:#000; text-shadow:none; margin:0;"><input type="radio" name="endCondition" value="TIME_LIMIT" onchange="toggleConditionUI()"> 限時衝分</label>
        </div>
        <div class="form-group" id="countInputWrapper"><label>🔢 挑戰題數：</label><input type="number" id="totalQuestionsInput" value="5" min="1" max="25" autocomplete="off"></div>
        <div class="form-group" id="timeLimitInputWrapper" style="display:none;"><label>⏱️ 限制時間選擇：</label>
            <select id="timeLimitSelect"><option value="180">3 分鐘快速賽</option><option value="300" selected>5 分鐘標準賽</option></select>
        </div>
        <button onclick="initChallengeSession()" class="btn-success">🎲 生成關卡，出發！</button>
    </div>

    <!-- 有問必答自訂面板 -->
    <div id="step1_solver" class="step-panel">
        <h2>🛠️ 數學有問必答 (自訂代入)</h2>
        <div class="form-group"><label>✏️ 請輸入代數公式主體：</label><input type="text" id="eqInput" placeholder="例如: 3x + 2y 或 (a+b)h/2" autocomplete="off"></div>
        <div class="form-group"><label>🔢 指定各變數的值（以逗號隔開）：</label><input type="text" id="xValueInput" placeholder="例如: x=4, y=-3" autocomplete="off"></div>
        <button onclick="handleManualSolverInput()" class="btn-success">開始代入引導</button>
    </div>

    <!-- 作答舞台 -->
    <div id="step2" class="step-panel">
        <div class="progress-banner"><span id="progressText">進度...</span><span id="scoreText" style="color:#fffb00;">積分：0</span></div>
        <h2>請依條件計算求值</h2>
        <div class="stage-box" id="displayEq">題目載入中...</div>
        <div class="form-group">
            <label>請填寫最終求得的數值（若有小數請精確至小數點後第1位）：</label>
            <input type="text" id="ansInput" placeholder="例如: 24 或 15.5" autocomplete="off">
        </div>
        <button onclick="checkFirstAnswer()" class="btn-success">提交結果並驗證答案</button>
    </div>

    <!-- 思維拆解黑板 -->
    <div id="step3" class="step-panel">
        <h2>代數式代入思維拆解</h2>
        <div class="stage-box" id="interactiveStageBox">展示台</div>
        <div style="background:rgba(0,0,0,0.4); padding:20px; border-radius:16px; margin:20px 0; line-height:2.2; font-family:monospace; color:#00ffc4; font-size:16px;" id="mathStepBox"></div>
        <button class="btn-success" onclick="advanceQuestion()">前進下一題 ➡️</button>
    </div>

    <!-- 羅坤山大數據高級數據報告 -->
    <div id="step_stats_panel" class="step-panel">
        <h2 class="non-print">📊 歷程練習數據報告</h2>
        
        <!-- 教師管理查閱後台 -->
        <div id="teacherQueryZone" class="non-print" style="background: rgba(243, 232, 255, 0.8); padding: 15px; border-radius: 16px; border: 2px dashed #8b5cf6; margin-bottom: 20px; display: none;">
            <p style="margin: 0 0 10px 0; font-weight: bold; color: #6b21a8; font-size: 15px;">🔍 教師跨系統權限調閱模組</p>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                <select id="queryClass" style="width: 130px; padding: 8px; font-size: 15px;"></select>
                <select id="querySeat" style="width: 100px; padding: 8px; font-size: 15px;"></select>
                <button onclick="loadTargetStudentDataByTeacher()" class="btn-purple" style="width: auto; padding: 8px 16px; margin: 0;">提取個案</button>
                <button onclick="loadWholeClassDataForPrint()" class="btn-warning" style="width: auto; padding: 8px 16px; background: #7c2d12; color: #fff; margin: 0;">打包全班分頁報告</button>
            </div>
        </div>

        <!-- 數據輸出主區塊 -->
        <div id="printOutputRenderZone">
            <div class="print-student-page">
                <div style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; margin-bottom: 15px;" class="non-print">
                    <h3 id="printStudentInfo" style="margin:0; color:#fffb00; font-size: 18px;">學生班別：加載中...</h3>
                    <p id="printDate" style="margin: 5px 0 0 0; font-size: 13px; color: #cbd5e1;">產出日期：-</p>
                </div>
                
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>題型架構</th>
                            <th>挑戰次數</th>
                            <th>首答對 (必殺)</th>
                            <th>補答對 (挽回)</th>
                            <th>失敗 / 破譯</th>
                            <th>首發率</th>
                            <th>綜合率</th>
                        </tr>
                    </thead>
                    <tbody id="statsTableBody"></tbody>
                </table>
                
                <h4 style="color: #fca5a5; margin-top: 20px; font-size: 16px; font-weight: bold;">
                    📘 目前未消滅錯題本數量 (計 <span id="statsWrongCount">0</span> 題)
                </h4>
            </div>
        </div>

        <div class="btn-group non-print">
            <button onclick="window.print()" class="btn-info">🖨️ 匯出 PDF 學習報告檔案</button>
            <button class="btn-secondary" onclick="switchSetupConfig('MAIN')" style="margin: 0;">↩️ 返回主目錄</button>
        </div>
    </div>
</div>

<script>
    let currentPanelId = "step1";
    let currentRole = "STUDENT", userRawClass = "", userRawSeat = "";
    let session = { currentMode: 'CHALLENGE', endCondition: 'COUNT', totalQuestions: 5, score: 0, currentIdx: 0, questionList: [], currentTypeNum: 1, wrongAttemptsThisQuestion: 0 };
    let cacheStorage = { EQ: { wrongBook: [], stats: {} } };
    let currentAns = 0, currentExplanation = "";

    document.addEventListener('DOMContentLoaded', function() {
        try {
            initGlobalStatsCache();
            renderTypeSelectOptions();
            checkActiveSession();
        } catch(e) { console.error(e); showPanel('step1'); }
    });

    // 🌟 初始化羅坤山大數據分析結構
    function initGlobalStatsCache() {
        cacheStorage.EQ.stats = {
            1: { name: "雙未知數求值公式維度 (BASIC)", total: 0, firstMatch: 0, retryMatch: 0, failed: 0 },
            2: { name: "三個未知數結構公式求值 (ADVANCED)", total: 0, firstMatch: 0, retryMatch: 0, failed: 0 },
            3: { name: "四個或以上多變數挑戰公式 (MASTER)", total: 0, firstMatch: 0, retryMatch: 0, failed: 0 }
        };
    }

    function checkActiveSession() {
        let savedRole = localStorage.getItem("Active_User_Role") || "GUEST";
        let savedClass = localStorage.getItem("Active_User_Class") || "1A";
        let savedSeat = localStorage.getItem("Active_User_Seat") || "1";
        
        currentRole = savedRole;
        userRawClass = savedClass;
        userRawSeat = savedSeat;

        let accountDOM = document.getElementById('topCenterAccount');
        if(accountDOM) {
            accountDOM.style.display = 'block';
            if (savedRole === "GUEST") {
                accountDOM.innerText = `挑戰者: 訪客體驗`;
            } else {
                accountDOM.innerText = `挑戰者: ${userRawClass}班${String(userRawSeat).padStart(2, '0')}號`;
            }
        }

        if(currentRole === "TEACHER") {
            if (accountDOM) accountDOM.innerText = `管理員：教師管理後台`;
            document.getElementById('teacherQueryZone').style.display = "block";
            buildTeacherQueryOptions();
        } else {
            try {
                let localCache = localStorage.getItem(`MultiVarCache_${userRawClass}-${userRawSeat}`);
                if(localCache) {
                    let parsed = JSON.parse(localCache);
                    cacheStorage.EQ.wrongBook = parsed.wrongBook || [];
                    if(parsed.stats) cacheStorage.EQ.stats = parsed.stats;
                }
            } catch(e) { cacheStorage.EQ.wrongBook = []; }
        }
        updateReviewMenuUI();
        showPanel('step1');
    }

    function buildTeacherQueryOptions() {
        const qC = document.getElementById('queryClass');
        const qS = document.getElementById('querySeat');
        if(!qC || !qS) return;
        qC.innerHTML = ""; qS.innerHTML = "";
        for(let g=1; g<=6; g++) ['A','B','C','D'].forEach(l => qC.innerHTML+=`<option value="${g}${l}">${g}${l}班</option>`);
        for(let i=1; i<=35; i++) qS.innerHTML+=`<option value="${i}">${i}號</option>`;
    }

    function renderTypeSelectOptions() {
        let ts = document.getElementById('typeSelect');
        if(ts) ts.innerHTML = `
            <option value="1">1. 雙未知數，代入一個數 (BASIC)</option>
            <option value="2">2. 三個未知數結構公式 (ADVANCED)</option>
            <option value="3">3. 四個或以上未知數挑戰 (MASTER)</option>
            <option value="MIX" selected>4. 🔀 跨維度全課題混合題型</option>
        `;
    }

    function toggleConditionUI() {
        try {
            let c = document.querySelector('input[name="endCondition"]:checked').value;
            let countBox = document.getElementById('countInputWrapper');
            let timeBox = document.getElementById('timeLimitInputWrapper');
            if(countBox) countBox.style.display = c === 'COUNT' ? 'block' : 'none';
            if(timeBox) timeBox.style.display = c === 'TIME_LIMIT' ? 'block' : 'none';
        } catch(e) { console.error("UI切換保護捕獲:", e); }
    }

    function showPanel(id) { 
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active')); 
        const targetPanel = document.getElementById(id);
        if (targetPanel) targetPanel.classList.add('active'); 
        currentPanelId = id;
        const navBtn = document.getElementById('navBackBtn');
        if (navBtn) navBtn.innerText = (id === 'step1') ? "← 返回學習大廳" : "← 返回主目錄";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleNavigationBack() {
        if (currentPanelId === 'step1') resetToMainMenu();
        else showPanel('step1');
    }

    function switchSetupConfig(configMode) {
        session.currentMode = configMode;
        if (configMode === 'CHALLENGE') { showPanel('step1_challenge'); toggleConditionUI(); }
        else if (configMode === 'MAIN') showPanel('step1');
        else if (configMode === 'SOLVER') showPanel('step1_solver');
        else if (configMode === 'STATS') { calculateAndRenderStats(); showPanel('step_stats_panel'); }
        else if (configMode === 'REVIEW') {
            if ((cacheStorage.EQ.wrongBook || []).length === 0) { alert("🎉 目前沒有未消滅的代數式錯題紀錄！"); return; }
            session.score = 0; session.currentIdx = 0; session.questionList = [...cacheStorage.EQ.wrongBook];
            loadEquationToStage();
        }
    }

    // 🌟 大數據儲存：本地快取機制
    function syncLocalSave() {
        if(currentRole === "GUEST") return;
        localStorage.setItem(`MultiVarCache_${userRawClass}-${userRawSeat}`, JSON.stringify({
            wrongBook: cacheStorage.EQ.wrongBook,
            stats: cacheStorage.EQ.stats
        }));
    }

    // 🌟 羅坤山老師跨系統數據分析渲染器
    function calculateAndRenderStats() {
        const tb = document.getElementById('statsTableBody');
        if(!tb) return;
        tb.innerHTML = "";

        let sectionTr = document.createElement('tr');
        sectionTr.className = "section-title";
        sectionTr.innerHTML = `<th colspan="7">🌀 多變數求值代入模組</th>`;
        tb.appendChild(sectionTr);

        let sObj = cacheStorage.EQ.stats;
        for(let k in sObj) {
            let r = sObj[k];
            let t = r.total;
            let fRate = t > 0 ? Math.round((r.firstMatch / t) * 100) + '%' : '0%';
            let cRate = t > 0 ? Math.round(((r.firstMatch + r.retryMatch) / t) * 100) + '%' : '0%';
            
            tb.innerHTML += `<tr>
                <td style='text-align:left; font-weight:bold; padding-left:15px;'>${r.name}</td>
                <td>${t}</td>
                <td style='color:#10b981; font-weight:bold;'>${r.firstMatch}</td>
                <td style='color:#f59e0b;'>${r.retryMatch}</td>
                <td style='color:#ef4444;'>${r.failed}</td>
                <td style='background:#f0fdf4; font-weight:bold; color:#10b981;'>${fRate}</td>
                <td style='background:#eff6ff; font-weight:bold; color:#3b82f6;'>${cRate}</td>
            </tr>`;
        }

        document.getElementById('statsWrongCount').innerText = cacheStorage.EQ.wrongBook.length;
        document.getElementById('printStudentInfo').innerHTML = `<span class="info-span">學生班別：${userRawClass} 班</span><span class="info-span">學號：${userRawSeat} 號</span>`;
        document.getElementById('printDate').innerText = `產出時間：` + new Date().toLocaleString();
    }

    // 👨‍🏫 教師查閱單人個案
    function loadTargetStudentDataByTeacher() {
        let tc = document.getElementById('queryClass').value;
        let ts = document.getElementById('querySeat').value;
        userRawClass = tc; userRawSeat = ts;
        calculateAndRenderStats();
        alert(`🎉 成功撈取 ${tc}班 ${ts}號 代入法歷程檔案！已同步更新報表。`);
    }

    // 👨‍🏫 教師一鍵打包全班列印

        if(!confirm(`確定要同步排隊撈取整個 ${tc}班 (1~35號) 的代入法求值學習紀錄嗎？`)) return;
        
        const zone = document.getElementById('printOutputRenderZone');
        zone.innerHTML = ""; 
        
        for(let i=1; i<=35; i++) {

            let rowsHTML = "";

            for(let k in cacheStorage.EQ.stats) {
                rowsHTML += `<tr><td style='text-align:left;padding-left:15px;'>${cacheStorage.EQ.stats[k].name}</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0%</td><td>0%</td></tr>`;

            pageDiv.innerHTML = `

                </div>
                <table class="stats-table">
                    <thead><tr><th>題型</th><th>挑戰次數</th><th>首答對</th><th>補答對</th><th>失敗</th><th>首發率</th><th>綜合率</th></tr></thead>
                    <tbody>${rowsHTML}</tbody>

        alert(`🎉 ${tc}班 全班代入法數據打包成功！分頁列印已渲染完畢。`);

    function generateSubstitutionQuestion(category, formulaIndex) {
        let randRange = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        let randEven = (min, max) => 2 * Math.floor(Math.random() * (max/2 - min/2 + 1)) + min;
        session.currentTypeNum = category;

        if (category === 1) {
            switch(formulaIndex) {
                case 0: { let x = randRange(2, 20); return `<div class="formula-row">A = x²</div><div class="condition-row">當 邊長 x = ${x} 時，面積 A = ?</div>|${x*x}|<b>步驟 1：</b> A = ${x}²<br><b>步驟 2：</b> A = ${x*x}`; }
                case 1: { let r = randRange(1, 15); return `<div class="formula-row">C = 4r</div><div class="condition-row">當 邊長 r = ${r} 時，周長 C = ?</div>|${4*r}|<b>步驟 1：</b> C = 4 × ${r}<br><b>步驟 2：</b> C = ${4*r}`; }
                case 2: { let d = randRange(2, 25); return `<div class="formula-row">d = 2r</div><div class="condition-row">當 半徑 r = ${d} 時，直徑 d = ?</div>|${2*d}|<b>步驟 1：</b> d = 2 × ${d}<br><b>步驟 2：</b> d = ${2*d}`; }
                case 3: { let m = randRange(5, 50); return `<div class="formula-row">W = 10m</div><div class="condition-row">當 質量 m = ${m} kg 時，重量 W = ?</div>|${10*m}|<b>步驟 1：</b> W = 10 × ${m}<br><b>步驟 2：</b> W = ${10*m}`; }
                case 4: { let c = randRange(1, 30); return `<div class="formula-row">P = 6c</div><div class="condition-row">當 邊長 c = ${c} 時，周長 P = ?</div>|${6*c}|<b>步驟 1：</b> P = 6 × ${c}<br><b>步驟 2：</b> P = ${6*c}`; }
                case 5: { let r = randRange(2, 10); return `<div class="formula-row">C = 2πr (取 π = 3)</div><div class="condition-row">當 半徑 r = ${r} 時，圓周長 C = ?</div>|${2*3*r}|<b>步驟 1：</b> C = 2 × 3 × ${r}<br><b>步驟 2：</b> C = ${2*3*r}`; }
                case 6: { let s = randRange(3, 12); return `<div class="formula-row">A = 6s²</div><div class="condition-row">當 邊長 s = ${s} 時，表面積 A = ?</div>|${6*s*s}|<b>步驟 1：</b> A = 6 × ${s}²<br><b>步驟 2：</b> A = 6 × ${s*s} = ${6*s*s}`; }
                case 7: { let n = randRange(4, 20); return `<div class="formula-row">S = 180(n - 2)</div><div class="condition-row">當 邊數 n = ${n} 時，內角和 S = ?</div>|${180*(n-2)}|<b>步驟 1：</b> S = 180 × (${n} - 2)<br><b>步驟 2：</b> S = 180 × ${n-2} = ${180*(n-2)}`; }
                case 8: { let r = randRange(2, 10); return `<div class="formula-row">A = πr² (取 π = 3)</div><div class="condition-row">當 半徑 r = ${r} 時，面積 A = ?</div>|${3*r*r}|<b>步驟 1：</b> A = 3 × ${r}²<br><b>步驟 2：</b> A = 3 × ${r*r} = ${3*r*r}`; }
                case 9: { let s = randRange(2, 12); return `<div class="formula-row">V = s³</div><div class="condition-row">當 邊長 s = ${s} 時，體積 V = ?</div>|${s*s*s}|<b>步驟 1：</b> V = ${s}³<br><b>步驟 2：</b> V = ${s*s*s}`; }
            }
        }
        else if (category === 2) {
            switch(formulaIndex) {
                case 0: { let a = randRange(2, 15), b = randRange(2, 12); return `<div class="formula-row">A = ab</div><div class="condition-row">當 長 a = ${a}, 寬 b = ${b} 時，面積 A = ?</div>|${a*b}|<b>步驟 1：</b> A = ${a} × ${b}<br><b>步驟 2：</b> A = ${a*b}`; }
                case 1: { let v = randRange(10, 100), t = randRange(2, 10); return `<div class="formula-row">v = s / t</div><div class="condition-row">當 距離 s = ${v*t}, 時間 t = ${t} 時，平均速度 v = ?</div>|${v}|<b>步驟 1：</b> v = ${v*t} / ${t}<br><b>步驟 2：</b> v = ${v}`; }
                case 2: { let m = randRange(20, 200), v = randRange(2, 10); return `<div class="formula-row">ρ = m / v</div><div class="condition-row">當 質量 m = ${m*v}, 體積 v = ${v} 時，密度 ρ = ?</div>|${m}|<b>步驟 1：</b> ρ = ${m*v} / ${v}<br><b>步驟 2：</b> ρ = ${m}`; }
                case 3: { let i = randRange(2, 10), r = randRange(3, 20); return `<div class="formula-row">V = IR</div><div class="condition-row">當 電流 I = ${i}, 電阻 R = ${r} 時，電壓 V = ?</div>|${i*r}|<b>步驟 1：</b> V = ${i} × ${r}<br><b>步驟 2：</b> V = ${i*r}`; }
                case 4: { let b = randRange(3, 15), h = randEven(2, 12); let frac=`<div class="math-fraction"><div class="fraction-numerator">b × h</div><div class="fraction-denominator">2</div></div>`; return `<div class="formula-row">A = ${frac}</div><div class="condition-row">當 底 b = ${b}, 高 h = ${h} 時，面積 A = ?</div>|${(b*h)/2}|<b>步驟 1：</b> A = (${b} × ${h}) / 2<br><b>步驟 2：</b> A = ${b*h} / 2 = ${(b*h)/2}`; }
                case 5: { let w = randRange(5, 30), d = randRange(2, 10); return `<div class="formula-row">M = Wd</div><div class="condition-row">當 重量 W = ${w}, 距離 d = ${d} 時，力矩 M = ?</div>|${w*d}|<b>步驟 1：</b> M = ${w} × ${d}<br><b>步驟 2：</b> M = ${w*d}`; }
                case 6: { let x = randRange(5, 20), y = randRange(2, 15); return `<div class="formula-row">z = 3x - 2y</div><div class="condition-row">當 x = ${x}, y = ${y} 時，z = ?</div>|${3*x-2*y}|<b>步驟 1：</b> z = 3 × ${x} - 2 × ${y}<br><b>步驟 2：</b> z = ${3*x} - ${2*y} = ${3*x-2*y}`; }
                case 7: { let r = randRange(2, 6), h = randRange(2, 10); return `<div class="formula-row">A = 2πrh (取 π = 3)</div><div class="condition-row">當 半徑 r = ${r}, 高 h = ${h} 時，曲面面積 A = ?</div>|${2*3*r*h}|<b>步驟 1：</b> A = 2 × 3 × ${r} × ${h}<br><b>步驟 2：</b> A = ${6*r} × ${h} = ${2*3*r*h}`; }
                case 8: { let a = randRange(5, 25), b = randRange(2, 10); return `<div class="formula-row">k = a² + b</div><div class="condition-row">當 a = ${a}, b = ${b} 時，k = ?</div>|${a*a+b}|<b>步驟 1：</b> k = ${a}² + ${b}<br><b>步驟 2：</b> k = ${a*a} + ${b} = ${a*a+b}`; }
                case 9: { let f = randRange(20, 100), a = randRange(2, 5); return `<div class="formula-row">P = F / A</div><div class="condition-row">當 垂直壓力 F = ${f*a}, 受力面積 A = ${a} 時，壓強 P = ?</div>|${f}|<b>步驟 1：</b> P = ${f*a} / ${a}<br><b>步驟 2：</b> P = ${f}`; }
            }
        }
        else {
            switch(formulaIndex) {
                case 0: { let a=randRange(2,10), b=randRange(2,10), h=randEven(2,10); let frac=`<div class="math-fraction"><div class="fraction-numerator">(a + b) × h</div><div class="fraction-denominator">2</div></div>`; return `<div class="formula-row">A = ${frac}</div><div class="condition-row">當 上底 a = ${a}, 下底 b = ${b}, 高 h = ${h} 時，面積 A = ?</div>|${((a+b)*h)/2}|<b>步驟 1：</b> A = (${a} + ${b}) × ${h} / 2<br><b>步驟 2：</b> A = ${a+b} × ${h} / 2 = ${((a+b)*h)/2}`; }
                case 1: { let p=100*randRange(2,10), r=randRange(2,6), t=randRange(1,3); let frac=`<div class="math-fraction"><div class="fraction-numerator">P × r × t</div><div class="fraction-denominator">100</div></div>`; return `<div class="formula-row">A = P + ${frac}</div><div class="condition-row">當 P = ${p}, r = ${r}, t = ${t} 時，本利和 A = ?</div>|${p+(p*r*t)/100}|<b>步驟 1：</b> A = ${p} + (${p} × ${r} × ${t}) / 100<br><b>步驟 2：</b> A = ${p} + ${(p*r*t)/100} = ${p+(p*r*t)/100}`; }
                case 2: { let u=randRange(2,8), t=randRange(2,5), a=randEven(2,6); let frac=`<div class="math-fraction"><div class="fraction-numerator">a × t²</div><div class="fraction-denominator">2</div></div>`; return `<div class="formula-row">s = ut + ${frac}</div><div class="condition-row">當 u = ${u}, t = ${t}, a = ${a} 時，位移 s = ?</div>|${u*t+(a*t*t)/2}|<b>步驟 1：</b> s = (${u} × ${t}) + (${a} × ${t}²) / 2<br><b>步驟 2：</b> s = ${u*t} + ${(a*t*t)/2} = ${u*t+(a*t*t)/2}`; }
                case 3: { let x=randRange(2,6), y=randRange(1,5), z=randRange(2,6); return `<div class="formula-row">w = 2x + 3y - z</div><div class="condition-row">當 x = ${x}, y = ${y}, z = ${z} 時，w = ?</div>|${2*x+3*y-z}|<b>步驟 1：</b> w = 2 × ${x} + 3 × ${y} - ${z}<br><b>步驟 2：</b> w = ${2*x} + ${3*y} - ${z} = ${2*x+3*y-z}`; }
                case 4: { let x=randRange(3,8), y=randRange(1,4), z=randRange(1,5); return `<div class="formula-row">p = xyz</div><div class="condition-row">當 x = ${x}, y = ${y}, z = ${z} 時，乘積 p = ?</div>|${x*y*z}|<b>步驟 1：</b> p = ${x} × ${y} × ${z}<br><b>步驟 2：</b> p = ${x*y*z}`; }
                case 5: { let a=randRange(2,6), b=randRange(2,6), c=randRange(2,6); return `<div class="formula-row">S = ab + 3bc</div><div class="condition-row">當 a = ${a}, b = ${b}, c = ${c} 時，表面積 S = ?</div>|${a*b+3*b*c}|<b>步驟 1：</b> S = (${a} × ${b}) + (3 × ${b} × ${c})<br><b>步驟 2：</b> S = ${a*b} + ${3*b*c} = ${a*b+3*b*c}`; }
                case 6: { let x=randRange(1,5), y=randRange(2,6), z=randRange(1,4); return `<div class="formula-row">m = x² + 2y - z³</div><div class="condition-row">當 x = ${x}, y = ${y}, z = ${z} 時，m = ?</div>|${x*x+2*y-z*z*z}|<b>步驟 1：</b> m = ${x}² + 2 × ${y} - ${z}³<br><b>步驟 2：</b> m = ${x*x} + ${2*y} - ${z*z*z} = ${x*x+2*y-z*z*z}`; }
                case 7: { let a=randRange(1,5), b=randRange(1,5), c=randRange(1,5), d=randRange(1,5); return `<div class="formula-row">T = a + b + c + d</div><div class="condition-row">當 a = ${a}, b = ${b}, c = ${c}, d = ${d} 時，總和 T = ?</div>|${a+b+c+d}|<b>步驟 1：</b> T = ${a} + ${b} + ${c} + ${d}<br><b>步驟 2：</b> T = ${a+b+c+d}`; }
                case 8: { let bArea=randRange(5,20), h=randRange(3,9); let frac=`<div class="math-fraction"><div class="fraction-numerator">A × h</div><div class="fraction-denominator">3</div></div>`; return `<div class="formula-row">V = ${frac}</div><div class="condition-row">當 底面積 A = ${bArea}, 高 h = ${h} 時，V = ?</div>|${Math.round((bArea*h)/3)}|<b>步驟 1：</b> V = (${bArea} × ${h}) / 3<br><b>步驟 2：</b> V = ${bArea*h} / 3 = ${Math.round((bArea*h)/3)}`; }
                case 9: { let x=randRange(2,10), y=randRange(1,5); if(x === y) x += 2; let frac=`<div class="math-fraction"><div class="fraction-numerator">x + y</div><div class="fraction-denominator">x - y</div></div>`; return `<div class="formula-row">R = ${frac}</div><div class="condition-row">當 x = ${x+y}, y = ${y} 時，R = ?</div>|${Math.round((x+y+y)/x)}|<b>步驟 1：</b> R = (${x+y} + ${y}) / (${x+y} - ${y})<br><b>步驟 2：</b> R = ${x+y+y} / ${x} = ${Math.round((x+y+y)/x)}`; }
            }
        }
    }

    function initChallengeSession() {
        session.score = 0; session.currentIdx = 0; session.questionList = [];
        let difficulty = document.getElementById('typeSelect').value;
        let count = parseInt(document.getElementById('totalQuestionsInput').value) || 5;
        
        let generatedCores = new Set();
        let loopSafety = 0;
        
        for (let i = 0; i < count; i++) {
            let activeCategory = (difficulty === "MIX") ? (i % 3) + 1 : Number(difficulty);
            let formulaIndex = Math.floor(Math.random() * 10);
            let newQ = generateSubstitutionQuestion(activeCategory, formulaIndex);
            let qCore = newQ.split('|')[0];
            
            if (!generatedCores.has(qCore)) {
                generatedCores.add(qCore);
                session.questionList.push(newQ);
            } else {
                i--;
            }
            loopSafety++;
            if(loopSafety > 250) break;
        }
        
        while (session.questionList.length < count) {
            session.questionList.push(generateSubstitutionQuestion(Math.floor(Math.random()*3)+1, Math.floor(Math.random()*10)));
        }
        loadEquationToStage();
    }

    function handleManualSolverInput() {
        let expr = document.getElementById('eqInput').value.trim() || "3x + 2y";
        let vals = document.getElementById('xValueInput').value.trim() || "x=2, y=5";
        session.score = 0; session.currentIdx = 0;
        let formulaHTML = `<div class="formula-row">🛠️ 自訂計算算式：${expr}</div>`;
        let conditionHTML = `<div class="condition-row">已知給定條件為：${vals}</div>`;
        
        session.questionList = [`${formulaHTML}${conditionHTML}|引導模式|處理中`];
        document.getElementById('scoreText').innerText = `自訂模式`;
        document.getElementById('progressText').innerText = `動態引導`;
        currentAns = "引導模式"; 
        currentExplanation = `<b>步驟 1 (對號入座)：</b>將算式中的變數替換為條件給定的數值。<br><b>步驟 2 (四則運算)：</b>遵循「先乘除、後加減」的順序完成計算。`;
        showPanel('step2');
    }

    function loadEquationToStage() {
        let data = session.questionList[session.currentIdx].split('|');
        document.getElementById('ansInput').value = "";
        document.getElementById('scoreText').innerText = `積分：${session.score}`;
        document.getElementById('progressText').innerText = `進度：第 ${session.currentIdx + 1}/${session.questionList.length} 題`;
        document.getElementById('displayEq').innerHTML = data[0];
        currentAns = data[1];
        currentExplanation = data[2];
        session.wrongAttemptsThisQuestion = 0;

        if(session.currentMode === 'CHALLENGE') {
            cacheStorage.EQ.stats[session.currentTypeNum].total++;
        }
        showPanel('step2');
    }

    function checkFirstAnswer() {
        let input = document.getElementById('ansInput').value.trim();
        let currentQ = session.questionList[session.currentIdx];
        let isCorrect = false;

        if(currentAns === "引導模式") {
            alert("🎯 成功啟動隱形括號破譯引導！");
            isCorrect = true;
        } else {
            let parsedStudent = parseFloat(input);
            let parsedCorrect = parseFloat(currentAns);
            if(Math.abs(parsedStudent - parsedCorrect) < 0.15 || input === currentAns) {
                isCorrect = true;
            }
        }

        if(isCorrect) {
            alert("🎯 太棒了，計算完全正確！");
            if(session.currentMode === 'CHALLENGE') {
                if(session.wrongAttemptsThisQuestion === 0) {
                    cacheStorage.EQ.stats[session.currentTypeNum].firstMatch++;
                } else {
                    cacheStorage.EQ.stats[session.currentTypeNum].retryMatch++;
                }
            }
            if(currentAns !== "引導模式") session.score++; 
            if (session.currentMode === 'REVIEW') {
                cacheStorage.EQ.wrongBook = cacheStorage.EQ.wrongBook.filter(q => q !== currentQ);
                localStorage.setItem(`MultiVarCache_${userRawClass}-${userRawSeat}`, JSON.stringify({ wrongBook: cacheStorage.EQ.wrongBook }));
            }
        } else {
            session.wrongAttemptsThisQuestion++;
            alert(`❌ 答案不對喔！標準答案是 ${parseFloat(currentAns).toFixed(1).replace('.0','')}`);
            
            if(session.currentMode === 'CHALLENGE' && session.wrongAttemptsThisQuestion === 1) {
                cacheStorage.EQ.stats[session.currentTypeNum].failed++;
            }

            if (!cacheStorage.EQ.wrongBook.includes(currentQ) && currentAns !== "引導模式") {
                cacheStorage.EQ.wrongBook.push(currentQ);
                localStorage.setItem(`MultiVarCache_${userRawClass}-${userRawSeat}`, JSON.stringify({ wrongBook: cacheStorage.EQ.wrongBook }));
            }
        }
        updateReviewMenuUI();
        syncLocalSave();
        
        let summaryDisplay = currentAns === "引導模式" ? "自訂引導完成" : parseFloat(currentAns).toFixed(1).replace('.0','');
        document.getElementById('interactiveStageBox').innerHTML = `解題總結：${summaryDisplay}`;
        document.getElementById('mathStepBox').innerHTML = currentExplanation;
        showPanel('step3');
    }

    function advanceQuestion() {
        if(currentAns === "引導模式") { resetToMainMenu(); return; }
        if(session.currentIdx < session.questionList.length - 1) {
            session.currentIdx++; loadEquationToStage();
        } else {
            switchSetupConfig('STATS');
        }
    }

    function updateReviewMenuUI() {
        let count = (cacheStorage.EQ.wrongBook || []).length;
        let card = document.getElementById('reviewModeCard');
        if (card) card.classList.toggle('disabled', count === 0);
        let title = document.getElementById('reviewTitle');
        if (title) title.innerText = `🗂️ 錯題庫 (${count})`;
    }

    function logoutSession() { localStorage.clear(); window.location.replace("index.html"); }
    function resetToMainMenu() { window.location.replace("home.html"); }
</script>
