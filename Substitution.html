<!-- HTML Head 確保加入 z-index: 999 與 input autocomplete="off" -->
<script>
    let currentPanelId = "step1"; 
    let cacheStorage = { EQ: { wrongBook: [], stats: getInitialStatsObject() } };

    // 第一時間強行攔截：偵測身分並銷毀備用登入面板
    function checkActiveSession() {
        let savedRole = localStorage.getItem("Active_User_Role");
        let savedClass = localStorage.getItem("Active_User_Class");
        let savedSeat = localStorage.getItem("Active_User_Seat");
        
        let loginPanel = document.getElementById('step0_login');
        let mainBox = document.getElementById('mainContainer');
        let accountDOM = document.getElementById('topCenterAccount');
        
        if (!savedRole) { 
            // 只有真沒快取，才顯示該頁自己的登入介面
            if(loginPanel) loginPanel.classList.add('active');
            if(mainBox) mainBox.style.display = 'none';
            return; 
        }

        // 有快取，強制隱藏 step0，解除 mainContainer 的隱藏
        if(loginPanel) loginPanel.classList.remove('active');
        if(mainBox) mainBox.style.display = 'block';
        if(accountDOM) accountDOM.style.display = 'block';

        if (savedRole === "GUEST") {
            currentRole = "GUEST"; userRawClass = "GUEST"; userRawSeat = "VISITOR";
            accountDOM.innerText = `挑戰者: 訪客體驗`;
            setupLayoutForStudent();
        } else if (savedRole === "STUDENT" || (savedClass && savedSeat)) {
            currentRole = "STUDENT"; userRawClass = savedClass || "1A"; userRawSeat = savedSeat || "1";
            initLocalFallback(userRawClass, userRawSeat);
            accountDOM.innerText = `挑戰者: ${userRawClass}班${String(userRawSeat).padStart(2, '0')}號`;
            setupLayoutForStudent();
            syncWithCloud("load");
        } else if (savedRole === "TEACHER") {
            currentRole = "TEACHER";
            accountDOM.innerText = `管理員後台`;
            document.querySelectorAll('.id-student-only').forEach(el=>el.style.display="none"); 
            document.querySelectorAll('.id-teacher-only').forEach(el=>el.style.display="flex");
        }
        
        // 眨眼間直達目錄
        showPanel('step1');
    }

    // 生命週期防禦：選單生成與事件綁定全在 DOMContentLoaded 後執行
    document.addEventListener('DOMContentLoaded', function() {
        try {
            // 即使跳過登入，背景的下拉選單依舊安全生成，避免 null
            let cHtml = "", sHtml = "", tHtml = "";
            for(let g=1;g<=6;g++) ['A','B','C','D'].forEach(l => cHtml+=`<option value="${g}${l}">${g}${l} 班</option>`);
            for(let i=1;i<=35;i++) sHtml+=`<option value="${i}">${i} 號</option>`;
            for(let i=1;i<=5;i++) tHtml+=`<option value="Teacher_0${i}">💼 0${i}號 管理員</option>`;
            
            if(document.getElementById('loginClass')) document.getElementById('loginClass').innerHTML = cHtml; 
            if(document.getElementById('loginSeat')) document.getElementById('loginSeat').innerHTML = sHtml; 
            if(document.getElementById('teacherSelect')) document.getElementById('teacherSelect').innerHTML = tHtml;

            renderTypeSelectOptions();
            
            // 系統環境全數準備完畢後發動通行校驗
            checkActiveSession();
        } catch(e) {
            console.error("DOM Initialization Error", e);
        }
    });

    // 動態導航系統
    function showPanel(id) { 
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active')); 
        const targetPanel = document.getElementById(id);
        if (targetPanel) targetPanel.classList.add('active'); 
        currentPanelId = id;

        // 隱藏登入層
        if (id !== 'step0_login') {
            let loginBox = document.getElementById('step0_login');
            if (loginBox) loginBox.style.display = 'none';
        }

        const navBtn = document.getElementById('navBackBtn');
        if (navBtn) {
            if (id === 'step1') {
                navBtn.innerText = "← 返回學習大廳";
            } else {
                navBtn.innerText = "← 返回主目錄";
            }
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleNavigationBack() {
        if (currentPanelId === 'step1') {
            stopSessionTimer();
            window.location.replace("home.html");
        } else {
            if (currentPanelId === 'step2' || currentPanelId === 'step3') {
                if (!confirm("確定要中途退出挑戰嗎？")) return;
            }
            stopSessionTimer();
            showPanel('step1');
        }
    }

    function logoutSession() { 
        if(confirm("確定登出系統嗎？")) { 
            stopSessionTimer(); localStorage.clear(); window.location.replace("index.html"); 
        } 
    }
    // ... 其餘代入法運算邏輯不變 ...
</script>
