<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學智能練習系統 - 中央大廳</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topCenterAccount" class="top-center-account"></div>

<div class="top-right-nav">
    <button class="top-nav-btn logout-btn-text" onclick="logoutSession()">🚪 登出系統</button>
</div>

<div class="container">
    <h1>🪐 數學智能學習大廳</h1>
    <div id="welcomeText" class="welcome-msg">歡迎回來</div>
    
    <div class="menu-grid">
        <a href="Substitution.html" class="game-card">
            <div class="game-icon">📐</div>
            <h2 class="game-title">多變數代數式求值</h2>
            <p class="game-desc">探索跨學科公式代入，啟動隱形括號破譯思維逐步解題！</p>
        </a>
        
        <a href="Polynomial.html" class="game-card">
            <div class="game-icon">🔮</div>
            <h2 class="game-title">多項式化簡與展開</h2>
            <p class="game-desc">啟動田字格魔法陣，輕鬆攻破去括號與同類項合併！</p>
        </a>
    </div>
</div>

<script>
    (function checkSecurityGate(){
        let role = localStorage.getItem("Active_User_Role");
        let cls = localStorage.getItem("Active_User_Class");
        let seat = localStorage.getItem("Active_User_Seat");
        if (!role) { window.location.href = "index.html"; return; }
        
        let badge = document.getElementById('topCenterAccount');
        let welcome = document.getElementById('welcomeText');
        
        // 🎯 統一身分識別快取命名空間
        if(role === 'STUDENT' || (role !== 'GUEST' && role !== 'TEACHER' && cls && seat)) {
            localStorage.setItem("Active_User_Role", "STUDENT"); // 標準化校驗標籤
            let info = `${cls}班${String(seat).padStart(2, '0')}號`;
            if(badge) badge.innerText = `挑戰者: ${info}`;
            if(welcome) welcome.innerText = `👋 準備好接受今日的數學挑戰了嗎，${info} 同學？`;
        } else if(role === 'GUEST') {
            if(badge) badge.innerText = `挑戰者: 訪客體驗`;
            if(welcome) welcome.innerText = `✨ 目前正在以 [訪客身份] 自由體驗沙盒關卡`;
        } else if(role === 'TEACHER') {
            let teacherId = localStorage.getItem("Active_User_TeacherID") || "Teacher_01";
            if(badge) badge.innerText = `管理員: ${teacherId.replace('Teacher_','')}`;
            if(welcome) welcome.innerText = `👨‍🏫 歡迎回來，管理員教師後台已安全對接`;
        }
    })();

    function logoutSession() { if(confirm("確定登出系統嗎？")) { localStorage.clear(); window.location.href = "index.html"; } }
</script>
</body>
</html>
