<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中一多項式加減系統 - 挑戰選單</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 確保全域星空背景與磨砂玻璃特效，並加強 z-index 防止 DOM 點擊遮擋 */
        body {
            background: url('https://i.imgur.com/f118Qxn.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .step-panel {
            display: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            z-index: 10;
            position: relative;
        }

        .step-panel.active {
            display: block;
        }

        .math-native-expr {
            font-size: 1.6em;
            color: #fffb00;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 原生教科書排版：直式對齊黑板 */
        .vertical-board-table {
            margin: 15px auto;
            border-collapse: collapse;
            font-size: 1.4em;
            color: #00ffc4;
            font-family: "Courier New", Courier, monospace;
            text-align: right;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 8px;
        }
        .vertical-board-table td {
            padding: 4px 12px;
            white-space: nowrap;
        }
        .vertical-board-table tr.line-row td {
            border-bottom: 2px solid #ffffff;
        }
        .op-col {
            text-align: left;
            width: 30px;
            font-weight: bold;
        }

        /* 橫式併項黑板美化 */
        .horizontal-step-line {
            font-size: 1.2em;
            margin: 12px 0;
            color: #ffffff;
            text-align: left;
            padding-left: 15px;
            border-left: 3px solid #00ffc4;
        }
        
        .timer-badge {
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid #ef4444;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="topCenterAccount" class="top-center-account"></div>

<div id="topLeftNav" class="top-left-nav" style="display: block;">
    <button id="dynamicNavBtn" class="top-nav-btn" onclick="handleTopLeftNav()" title="返回">← 返回學習大廳</button>
</div>

<div id="topRightNav" class="top-right-nav">
    <button class="top-nav-btn logout-btn-text" onclick="logoutSession()" title="登出">🚪 登出</button>
</div>

<div class="container" id="mainContainer">
    
    <div id="step1" class="step-panel dashboard-wrapper">
        <div class="greeting-text">請選擇挑戰模式</div>
        <div class="dashboard-grid">
            <div class="dash-btn bg-purple" onclick="switchSetupConfig('CHALLENGE')">
                <div><div class="dash-icon">🎮</div><div class="dash-title">多項式挑戰賽</div></div>
                <div class="dash-desc">進入關卡挑戰多項式加減化簡</div>
            </div>
            <div class="dash-btn bg-orange" onclick="switchSetupConfig('STATS')">
                <div><div class="dash-icon">🏆</div><div class="dash-title">即時記錄</div></div>
                <div class="dash-desc">查看全球玩家與個人排名</div>
            </div>
            <div class="dash-btn bg-teal" onclick="switchSetupConfig('SOLVER')">
                <div><div class="dash-icon"><i>f(x)</i></div><div class="dash-title">多項式計算機</div></div>
                <div class="dash-desc">輸入任意多項式進行橫式與直式拆解</div>
            </div>
            <div id="reviewModeCard" class="dash-btn bg-blue" onclick="switchSetupConfig('REVIEW')">
                <div><div class="dash-icon">🗂️</div><div class="dash-title" id="reviewTitle">錯題庫 (還剩 0 題)</div></div>
                <div class="dash-desc">重溫卡片與未攻破題型</div>
            </div>
        </div>
    </div>

    <div id="step1_challenge" class="step-panel">
        <h2>🎮 闖關模式設定</h2>
        <div class="form-group"><label>🧭 題目難度結構：</label><select id="typeSelect"></select></div>
        <div class="form-group">
            <label>終點條件：</label>
            <div class="radio-group">
                <label><input type="radio" name="endCondition" value="COUNT" checked onchange="toggleConditionUI()"> 固定題數模式</label>
                <label><input type="radio" name="endCondition" value="TIME_LIMIT" onchange="toggleConditionUI()"> ⏳ 限時瘋狂衝分模式</label>
            </div>
        </div>
        <div class="form-group" id="countInputWrapper"><label>🔢 挑戰題數：</label><input type="number" id="totalQuestionsInput" value="5" min="1" max="25"></div>
        <div class="form-group" id="timeLimitInputWrapper" style="display: none;">
            <label>⏱️ 限制時間選擇：</label>
            <select id="timeLimitSelect">
                <option value="180" selected>3 分鐘衝刺賽</option>
                <option value="300">5 分鐘標準賽</option>
            </select>
        </div>
        <button onclick="initChallengeSession()" class="screenshot-btn">🎲 生成關卡，出發！</button>
    </div>

    <div id="step1_solver" class="step-panel">
        <h2>🛠️ 多項式有問必答 (自訂化簡)</h2>
        <div class="form-group">
            <label>✏️ 請輸入多項式相加減算式：</label>
            <input type="text" id="polyInput" placeholder="例如: (2x² + 3x) + (x² - 5x)" autocomplete="off">
        </div>
        <button onclick="handleManualSolverInput()" class="screenshot-btn">開始多項式化簡引導</button>
    </div>

    <div id="step2" class="step-panel">
        <div class="progress-banner">
            <div class="progress-banner-header">
                <span id="progressText">進度...</span>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span id="globalTimerBox" class="timer-badge">⏱️ 00:00</span>
                    <span id="scoreText" style="background:rgba(0,0,0,0.4);color:#fffb00;padding:4px 8px;border-radius:20px;">積分：0</span>
                </div>
            </div>
        </div>
        <h2>請將以下多項式進行化簡</h2>
        <div class="stage-box" style="padding: 20px; text-align: center;">
            <span id="displayPoly" class="math-native-expr"></span>
        </div>
        <div id="studentAnswerFormContainer">
            <div class="form-group" id="primaryInputWrapper">
                <label id="inputLabel">請輸入化簡後的最終多項式：</label>
                <input type="text" id="ansInput" placeholder="例如: 3x²-2x 或 5x+7" autocomplete="off">
            </div>
        </div>
        <button id="submitAnsBtn" onclick="checkAnswer()">提交結果並驗證答案</button>
    </div>

    <div id="step3" class="step-panel">
        <h2>多項式計算思維拆解</h2>
        <div class="stage-box" style="font-size: 1.2em; text-align: center; margin-bottom: 20px;">
            最終答案：<span id="interactiveStageBox" class="math-native-expr"></span>
        </div>
        <div id="teachingZone" class="teaching-row" style="display: flex; flex-wrap: wrap; gap: 20px;">
            <div class="teaching-column" style="flex: 1; min-width: 280px;">
                <h3>📝 橫式併項黑板</h3>
                <div class="math-step-box" id="horizontalStepBox" style="line-height: 2; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;"></div>
            </div>
            <div class="teaching-column" style="flex: 1; min-width: 280px;">
                <h3>📊 直式對齊黑板</h3>
                <div class="math-step-box" id="verticalStepBox" style="text-align: center;"></div>
            </div>
        </div>
        <button id="nextBtn" class="btn-success" onclick="advanceQuestion()" style="display:none;margin-top:20px; width: 100%;">前進下一題 ➡️</button>
    </div>

    <div id="step_stats_panel" class="step-panel">
        <h2>📊 學生多項式化簡數據報告</h2>
        <div id="printOutputRenderZone">
            <div class="print-student-page">
                <h3 id="printStudentInfo">挑戰者歷程報告</h3>
                <div id="timeModeResultSummary" style="margin: 15px 0; padding: 12px; background: #fffbeb; border-radius: 8px; font-weight: bold; border-left: 4px solid var(--warning); display: none; color: #0f172a;"></div>
                <table class="stats-table" style="width: 100%; border-collapse: collapse; margin-top: 15px;">
                    <thead>
                        <tr style="background: rgba(255,255,255,0.2);">
                            <th style="padding: 10px;">題型結構</th>
                            <th style="padding: 10px;">挑戰狀態</th>
                            <th style="padding: 10px;">最終得分</th>
                        </tr>
                    </thead>
                    <tbody id="statsTableBody" style="text-align: center;">
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                            <td style="padding: 10px;">多項式加減大挑戰</td>
                            <td style="padding: 10px;">完賽結算</td>
                            <td id="statsFinalScore" style="color:#fffb00;font-weight:bold; padding: 10px;">0 分</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="btn-group" style="display:flex;gap:15px;margin-top:20px;">
            <button onclick="window.print()" class="btn-info" style="flex: 1;">🖨️ 匯出 PDF</button>
            <button class="btn-secondary" onclick="resetToMainMenu(false)" style="flex: 1;">↩️ 返回主目錄</button>
        </div>
    </div>
</div>

<script>
    let currentRole = "";
    let currentPanelId = "step1"; 
    let session = { currentMode: 'CHALLENGE', endCondition: 'COUNT', totalQuestions: 5, timeLimitSetting: 300, score: 0, currentIdx: 0, questionList: [], selectedType: 'MIX' };
    let polyData = { rawExpr: "", ansStr: "", type: "ADD", texExpr: "", texAns: "", p1: "", op: "", p2: "", a1:0, b1:0, c1:0, a2:0, b2:0, c2:0, ansA:0, ansB:0, ansC:0, isQuad: true };
    let timerInterval = null; let timeLeft = 0;
    let wrongQuestionBank = [];

    const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbwIK7Mqd4WEDpbuZR-PDt4pq-8EkZ74POUDDe9WgxZA_5QqPvIBdGdD2jVFjsVOZRIj/exec";

    function convertToNativeSup(str) {
        if (!str) return "0";
        return str.replace(/x\^2/g, "x²").replace(/x\^1/g, "x");
    }

    async function syncWithCloud(action, payload = null) {
        const userKey = localStorage.getItem("Active_User_Role") || "GUEST";
        if (userKey === "GUEST") return null;
        try {
            if (action === "load") {
                const url = `${GOOGLE_SHEET_API}?jsonData=${encodeURIComponent(JSON.stringify({ action: "load", userKey: userKey }))}`;
                const response = await fetch(url);
                const resData = await response.json();
                if (resData.success) return resData;
            } else if (action === "save" && payload) {
                const cloudCurrent = await syncWithCloud("load");
                let mergedStats = cloudCurrent && cloudCurrent.stats ? cloudCurrent.stats : {};
                let mergedWB = cloudCurrent && cloudCurrent.wrongBook ? cloudCurrent.wrongBook : {};
                
                mergedStats["poly"] = payload.stats;
                mergedWB["poly"] = payload.wrongBook;

                const postBody = { action: "save", userKey: userKey, stats: mergedStats, wrongBook: mergedWB };
                await fetch(GOOGLE_SHEET_API, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(postBody)
                });
            }
        } catch (e) { console.error("雲端同步異常:", e); }
        return null;
    }

    function updateReviewCardUI() {
        wrongQuestionBank = JSON.parse(localStorage.getItem("Poly_Wrong_Bank")) || [];
        const reviewTitle = document.getElementById('reviewTitle');
        if (reviewTitle) reviewTitle.innerText = `錯題庫 (還剩 ${wrongQuestionBank.length} 題)`;
    }

    function updateNavbarRouting(panelId) {
        currentPanelId = panelId;
        const navBtn = document.getElementById('dynamicNavBtn');
        if (!navBtn) return;

        if (panelId === 'step1') {
            navBtn.innerText = "← 返回學習大廳";
            navBtn.title = "跳轉至外部大廳 home.html";
        } else {
            navBtn.innerText = "← 返回主目錄";
            navBtn.title = "返回多項式主選單";
        }
    }

    function handleTopLeftNav() {
        if (currentPanelId === 'step1') {
            stopSessionTimer();
            window.location.href = "home.html";
        } else {
            stopSessionTimer();
            showPanel('step1');
        }
    }

    function showPanel(id) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
        const targetPanel = document.getElementById(id);
        if (targetPanel) targetPanel.classList.add('active');
        document.getElementById('topLeftNav').style.display = 'block';
        updateNavbarRouting(id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function switchSetupConfig(mode) {
        session.currentMode = mode;
        if (mode === 'CHALLENGE') {
            document.getElementById('typeSelect').innerHTML = `
                <option value="LINEAR">1. 一次多項式加減 (題型1-3)</option>
                <option value="QUAD">2. 二次多項式加減 (題型4)</option>
                <option value="MIX" selected>3. 🔀 混合全題型挑戰</option>
            `;
            showPanel('step1_challenge');
        } else if (mode === 'SOLVER') {
            showPanel('step1_solver');
        } else if (mode === 'STATS') {
            document.getElementById('statsFinalScore').innerText = `${session.score} 分`;
            showPanel('step_stats_panel');
            updateReviewCardUI();
        } else if (mode === 'REVIEW') {
            wrongQuestionBank = JSON.parse(localStorage.getItem("Poly_Wrong_Bank")) || [];
            if (wrongQuestionBank.length === 0) {
                alert("🎉 太棒了！目前多項式沒有任何錯題記錄！");
                return;
            }
            stopSessionTimer();
            session.score = 0; session.currentIdx = 0;
            session.questionList = [...wrongQuestionBank];
            session.endCondition = 'COUNT';
            session.totalQuestions = session.questionList.length;
            if(document.getElementById('timeModeResultSummary')) {
                document.getElementById('timeModeResultSummary').style.display = 'none';
            }
            loadQuestionToStage();
        }
    }

    function toggleConditionUI() {
        let c = document.querySelector('input[name="endCondition"]:checked').value;
        document.getElementById('countInputWrapper').style.display = c === 'COUNT' ? 'block' : 'none';
        document.getElementById('timeLimitInputWrapper').style.display = c === 'TIME_LIMIT' ? 'block' : 'none';
    }

    // 正負號網頁教科書美化格式化引擎
    function fmtTerm(coef, variable, isFirst) {
        if (coef === 0) return "";
        let sign = coef > 0 ? (isFirst ? "" : "+") : "-";
        let absCoef = Math.abs(coef);
        let coefStr = (absCoef === 1 && variable !== "") ? "" : absCoef;
        return sign + coefStr + variable;
    }

    function normalizePolyStr(str) {
        let norm = str.replace(/\s+/g, '').replace(/²/g, '^2').replace(/¹/g, '').replace(/⁺/g, '+').replace(/⁻/g, '-');
        return norm.replace(/\+x/g, '+1x').replace(/-x/g, '-1x').replace(/^x/, '1x').replace(/\+y/g, '+1y').replace(/-y/g, '-1y').replace(/^y/, '1y');
    }

    // 🚀 核心重構：支援 4 大題型且係數皆可為正負數的出題引擎
    function generatePolynomialQuestion(mode) {
        let typeNum = 1;
        if (mode === 'LINEAR') {
            typeNum = Math.floor(Math.random() * 3) + 1; // 抽題型 1, 2, 3
        } else if (mode === 'QUAD') {
            typeNum = 4; // 固定題型 4
        } else {
            typeNum = Math.floor(Math.random() * 4) + 1; // 1, 2, 3, 4 全抽
        }

        let p1Str = "", p2Str = "", ansStr = "", op = "+";
        let isQuad = (typeNum === 4);

        function randNonZero(min, max) {
            let r = 0;
            while(r === 0) { r = Math.floor(Math.random() * (max - min + 1)) + min; }
            return r;
        }
        function randNum(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        switch(typeNum) {
            case 1: {
                // 1. (a+bx) + (c+dx) -> 故意異序排列訓練同類項觀念
                let a = randNonZero(-6, 6), b = randNonZero(-5, 5);
                let c = randNonZero(-6, 6), d = randNonZero(-5, 5);
                op = "+";
                
                p1Str = fmtTerm(a, "", true) + fmtTerm(b, "x", false);
                p2Str = fmtTerm(c, "", true) + fmtTerm(d, "x", false);
                
                let ansX = b + d;
                let ansConst = a + c;
                ansStr = fmtTerm(ansX, "x", true) + fmtTerm(ansConst, "", ansX === 0);
                
                // 係數對位儲存快取
                polyData.a1 = 0; polyData.b1 = b; polyData.c1 = a;
                polyData.a2 = 0; polyData.b2 = d; polyData.c2 = c;
                polyData.ansA = 0; polyData.ansB = ansX; polyData.ansC = ansConst;
                break;
            }
            case 2:
            case 3: {
                // 2. (ax+by) + (cx+dy) 
                // 3. (ax+by) - (cx+dy)
                let a = randNonZero(-5, 5), b = randNonZero(-5, 5);
                let c = randNonZero(-5, 5), d = randNonZero(-5, 5);
                op = (typeNum === 2) ? "+" : "-";
                
                p1Str = fmtTerm(a, "x", true) + fmtTerm(b, "y", false);
                p2Str = fmtTerm(c, "x", true) + fmtTerm(d, "y", false);
                
                let ansX = (op === "+") ? (a + c) : (a - c);
                let ansY = (op === "+") ? (b + d) : (b - d);
                
                ansStr = fmtTerm(ansX, "x", true) + fmtTerm(ansY, "y", ansX === 0);
                
                polyData.a1 = 0; polyData.b1 = a; polyData.c1 = b;
                polyData.a2 = 0; polyData.b2 = c; polyData.c2 = d;
                polyData.ansA = 0; polyData.ansB = ansX; polyData.ansC = ansY;
                break;
            }
            case 4: {
                // 4. (ax^2 + bx + c) + (dx^2 + ex + f)
                let a = randNonZero(-4, 4), b = randNum(-5, 5), c = randNum(-6, 6);
                let d = randNonZero(-4, 4), e = randNum(-5, 5), f = randNum(-6, 6);
                while (a + d === 0) { d = randNonZero(-4, 4); }
                op = "+";
                
                p1Str = fmtTerm(a, "x^2", true) + fmtTerm(b, "x", false) + fmtTerm(c, "", false);
                p2Str = fmtTerm(d, "x^2", true) + fmtTerm(e, "x", false) + fmtTerm(f, "", false);
                
                let ansA = a + d;
                let ansB = b + e;
                let ansC = c + f;
                
                ansStr = fmtTerm(ansA, "x^2", true) + fmtTerm(ansB, "x", ansA === 0) + fmtTerm(ansC, "", ansA === 0 && ansB === 0);
                
                polyData.a1 = a; polyData.b1 = b; polyData.c1 = c;
                polyData.a2 = d; polyData.b2 = e; polyData.c2 = f;
                polyData.ansA = ansA; polyData.ansB = ansB; polyData.ansC = ansC;
                break;
            }
        }

        let texExpr = `(${p1Str}) ${op} (${p2Str})`;
        return `${texExpr}|${ansStr}|${p1Str}|${op}|${p2Str}|${polyData.a1},${polyData.b1},${polyData.c1}|${polyData.a2},${polyData.b2},${polyData.c2}|${polyData.ansA},${polyData.ansB},${polyData.ansC}|${isQuad?1:0}|${typeNum}`;
    }

    function initChallengeSession() {
        session.score = 0; session.currentIdx = 0; session.questionList = [];
        session.endCondition = document.querySelector('input[name="endCondition"]:checked').value;
        session.selectedType = document.getElementById('typeSelect').value;
        if(document.getElementById('timeModeResultSummary')) {
            document.getElementById('timeModeResultSummary').style.display = 'none';
        }

        if (session.endCondition === 'COUNT') {
            stopSessionTimer();
            session.totalQuestions = parseInt(document.getElementById('totalQuestionsInput').value) || 5;
            for(let i=0; i<session.totalQuestions; i++) session.questionList.push(generatePolynomialQuestion(session.selectedType));
        } else {
            let sec = parseInt(document.getElementById('timeLimitSelect').value) || 180;
            session.timeLimitSetting = sec;
            session.questionList.push(generatePolynomialQuestion(session.selectedType));
            startSessionTimer(sec);
        }
        loadQuestionToStage();
    }

    function handleManualSolverInput() {
        stopSessionTimer();
        let input = document.getElementById('polyInput').value.trim() || "(2x² + 3x) + (x² - 5x)";
        let stdInput = input.replace(/²/g, '^2');
        session.questionList = [`(${stdInput})|3x^2-2x|2x^2+3x|+|x^2-5x|2,3,0|1,-5,0|3,-2,0|1|4`];
        session.currentIdx = 0;
        loadQuestionToStage();
    }

    function loadQuestionToStage() {
        document.getElementById('ansInput').value = '';
        let parts = session.questionList[session.currentIdx].split('|');
        
        polyData.texExpr = parts[0];
        polyData.ansStr = parts[1];
        polyData.texAns = parts[1];
        polyData.p1 = parts[2];
        polyData.op = parts[3];
        polyData.p2 = parts[4];
        
        let c1 = parts[5].split(',').map(Number);
        polyData.a1 = c1[0]; polyData.b1 = c1[1]; polyData.c1 = c1[2];
        let c2 = parts[6].split(',').map(Number);
        polyData.a2 = c2[0]; polyData.b2 = c2[1]; polyData.c2 = c2[2];
        let c3 = parts[7].split(',').map(Number);
        polyData.ansA = c3[0]; polyData.ansB = c3[1]; polyData.ansC = c3[2];
        polyData.isQuad = Number(parts[8]) === 1;

        document.getElementById('scoreText').innerText = `積分：${session.score}`;
        
        if (session.currentMode === 'REVIEW') {
            document.getElementById('progressText').innerText = `🔥 錯題重溫中：第 ${session.currentIdx + 1} / ${session.totalQuestions} 題`;
        } else {
            document.getElementById('progressText').innerText = session.endCondition === 'TIME_LIMIT' ? `⏳ 限時狂熱衝分中！` : `題驗進度：第 ${session.currentIdx + 1} 題`;
        }
        
        document.getElementById('displayPoly').innerHTML = convertToNativeSup(polyData.texExpr);
        showPanel('step2');
    }

    function checkAnswer() {
        let studentAns = document.getElementById('ansInput').value.trim();
        let normStudent = normalizePolyStr(studentAns);
        let normCorrect = normalizePolyStr(polyData.ansStr);
        let currentQuestionStr = session.questionList[session.currentIdx];

        if(normStudent === normCorrect || studentAns === polyData.ansStr) {
            session.score++;
            if (session.currentMode === 'REVIEW') {
                wrongQuestionBank = wrongQuestionBank.filter(q => q !== currentQuestionStr);
                localStorage.setItem("Poly_Wrong_Bank", JSON.stringify(wrongQuestionBank));
            }
            alert("🎯 計算完全正確！");
        } else {
            alert(`❌ 答案不太對喔！已為你記錄此題。讓我們來看解題拆解！`);
            if (!wrongQuestionBank.includes(currentQuestionStr)) {
                wrongQuestionBank.push(currentQuestionStr);
                localStorage.setItem("Poly_Wrong_Bank", JSON.stringify(wrongQuestionBank));
            }
        }

        syncWithCloud("save", {
            stats: { lastScore: session.score, lastTotal: session.currentIdx + 1, timestamp: new Date().toLocaleString() },
            wrongBook: wrongQuestionBank
        });

        showPanel('step3');
        renderExplanationStage();
    }

    // 🏆 自適應題型直式對齊網頁表格引擎
    function generateVerticalTableHTML() {
        let parts = session.questionList[session.currentIdx].split('|');
        let typeNum = parts[9] ? Number(parts[9]) : 4;
        let opSymbol = polyData.op;
        
        function parseTerm(val, label) {
            if (val === 0) return { sign: "", valStr: "" };
            let sign = val > 0 ? "+" : "-";
            let abs = Math.abs(val);
            let coefStr = (abs === 1 && label !== "") ? "" : abs;
            return { sign: sign, valStr: coefStr + label };
        }

        if (typeNum === 4) {
            // 題型 4 的直式三欄對齊 (x², x, 常數)
            let t1_2 = parseTerm(polyData.a1, "x²");
            let t1_1 = parseTerm(polyData.b1, "x");
            let t1_0 = parseTerm(polyData.c1, "");

            let t2_2 = parseTerm(polyData.a2, "x²");
            let t2_1 = parseTerm(polyData.b2, "x");
            let t2_0 = parseTerm(polyData.c2, "");

            let t3_2 = parseTerm(polyData.ansA, "x²");
            let t3_1 = parseTerm(polyData.ansB, "x");
            let t3_0 = parseTerm(polyData.ansC, "");

            return `
                <table class="vertical-board-table">
                    <tr>
                        <td></td>
                        <td style="text-align:right;">${polyData.a1 < 0 ? '-' : ''}${t1_2.valStr}</td>
                        <td>${t1_1.sign}</td><td>${t1_1.valStr}</td>
                        <td>${t1_0.sign}</td><td>${t1_0.valStr}</td>
                    </tr>
                    <tr class="line-row">
                        <td class="op-col">${opSymbol}</td>
                        <td style="text-align:right;">${polyData.a2 < 0 ? '-' : ''}${t2_2.valStr}</td>
                        <td>${t2_1.sign}</td><td>${t2_1.valStr}</td>
                        <td>${t2_0.sign}</td><td>${t2_0.valStr}</td>
                    </tr>
                    <tr>
                        <td></td>
                        <td style="text-align:right; color:#fffb00; font-weight:bold;">${polyData.ansA < 0 ? '-' : ''}${t3_2.valStr}</td>
                        <td style="color:#fffb00;">${t3_1.sign}</td><td style="color:#fffb00; font-weight:bold;">${t3_1.valStr}</td>
                        <td style="color:#fffb00;">${t3_0.sign}</td><td style="color:#fffb00; font-weight:bold;">${t3_0.valStr}</td>
                    </tr>
                </table>
            `;
        } else {
            // 題型 1, 2, 3 的二欄直式對齊
            let col1Label = (typeNum === 1) ? "x" : "x";
            let col2Label = (typeNum === 1) ? "" : "y";

            let t1_1 = parseTerm(polyData.b1, col1Label);
            let t1_0 = parseTerm(polyData.c1, col2Label);
            let t2_1 = parseTerm(polyData.b2, col1Label);
            let t2_0 = parseTerm(polyData.c2, col2Label);
            let t3_1 = parseTerm(polyData.ansB, col1Label);
            let t3_0 = parseTerm(polyData.ansC, col2Label);

            let headSign1 = polyData.b1 < 0 ? "-" : "";
            let headSign2 = polyData.b2 < 0 ? "-" : "";
            let headSign3 = polyData.ansB < 0 ? "-" : "";

            return `
                <table class="vertical-board-table">
                    <tr>
                        <td></td>
                        <td style="text-align:right;">${headSign1}${t1_1.valStr}</td>
                        <td>${t1_0.sign}</td><td>${t1_0.valStr}</td>
                    </tr>
                    <tr class="line-row">
                        <td class="op-col">${opSymbol}</td>
                        <td style="text-align:right;">${headSign2}${t2_1.valStr}</td>
                        <td>${t2_0.sign}</td><td>${t2_0.valStr}</td>
                    </tr>
                    <tr>
                        <td></td>
                        <td style="text-align:right; color:#fffb00; font-weight:bold;">${headSign3}${t3_1.valStr}</td>
                        <td style="color:#fffb00;">${t3_0.sign}</td><td style="color:#fffb00; font-weight:bold;">${t3_0.valStr}</td>
                    </tr>
                </table>
            `;
        }
    }

    // 🚀 橫式併項去括號變號精細度刻劃
    function renderExplanationStage() {
        document.getElementById('interactiveStageBox').innerHTML = convertToNativeSup(polyData.texAns);

        let parts = session.questionList[session.currentIdx].split('|');
        let typeNum = parts[9] ? Number(parts[9]) : 4;

        let step2Str = "";
        if (polyData.op === '+') {
            // 加法去括號：第二個多項式首項若是正數需補 "+"，負數則自帶 "-"
            let p2Head = (!polyData.p2.startsWith('-') ? '+' : '') + polyData.p2;
            step2Str = `${polyData.p1}${p2Head}`;
        } else {
            // 減法去括號變號機制 (特別針對 題型 3)
            let c = polyData.b2; 
            let d = polyData.c2; 
            
            let term1 = (-c > 0 ? "+" : "-") + Math.abs(c) + "x";
            let term2 = (-d > 0 ? "+" : "-") + Math.abs(d) + "y";
            
            term1 = term1.replace(/1x/g, "x");
            term2 = term2.replace(/1y/g, "y");
            
            step2Str = `${polyData.p1}${term1}${term2}`;
        }

        let htmlHorizontal = `
            <div class="horizontal-step-line"><b>步驟 1 (原式)：</b> ${convertToNativeSup('(' + polyData.p1 + ') ' + polyData.op + ' (' + polyData.p2 + ')')}</div>
            <div class="horizontal-step-line"><b>步驟 2 (去括號變號)：</b> ${convertToNativeSup(step2Str)}</div>
            <div class="horizontal-step-line" style="color:#fffb00;"><b>步驟 3 (同類項合併)：</b> ${convertToNativeSup(polyData.texAns)}</div>
        `;
        document.getElementById('horizontalStepBox').innerHTML = htmlHorizontal;

        document.getElementById('verticalStepBox').innerHTML = generateVerticalTableHTML();
        document.getElementById('nextBtn').style.display = "block";
    }

    function advanceQuestion() {
        if (session.endCondition === 'TIME_LIMIT' && timeLeft > 0) {
            session.currentIdx++; session.questionList.push(generatePolynomialQuestion(session.selectedType)); loadQuestionToStage();
        } else if (session.endCondition === 'COUNT' && session.currentIdx < (session.totalQuestions - 1)) {
            session.currentIdx++; loadQuestionToStage();
        } else {
            stopSessionTimer(); switchSetupConfig('STATS');
        }
    }

    function startSessionTimer(seconds) {
        stopSessionTimer(); timeLeft = seconds;
        document.getElementById('globalTimerBox').style.display = 'inline-block';
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('globalTimerBox').innerText = `⏱️ ${m}:${s}`;
            if (timeLeft <= 0) { 
                stopSessionTimer(); 
                if(document.getElementById('timeModeResultSummary')) {
                    document.getElementById('timeModeResultSummary').style.display = 'block';
                    document.getElementById('timeModeResultSummary').innerHTML = `🏁 限時賽完賽：你斬獲了 <span style='font-size:20px;color:#ef4444;'>${session.score}</span> 分！`;
                }
                switchSetupConfig('STATS'); 
            }
        }, 1000);
    }
    
    function stopSessionTimer() { if(timerInterval) { clearInterval(timerInterval); timerInterval = null; } document.getElementById('globalTimerBox').style.display = 'none'; }
    function resetToMainMenu(nc) { stopSessionTimer(); window.location.href = "home.html"; }
    function logoutSession() { stopSessionTimer(); localStorage.clear(); window.location.href = "index.html"; }

    (async function init() {
        currentRole = localStorage.getItem("Active_User_Role") || "GUEST";
        document.getElementById('topCenterAccount').innerText = `挑戰者: ${currentRole}`;
        
        showPanel('step1');
        
        const cloudData = await syncWithCloud("load");
        if (cloudData && cloudData.wrongBook && cloudData.wrongBook.poly) {
            localStorage.setItem("Poly_Wrong_Bank", JSON.stringify(cloudData.wrongBook.poly));
        }
        updateReviewCardUI();
    })();
</script>
</body>
</html>
