<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多項式智能練習系統 - 挑戰選單</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topCenterAccount" class="top-center-account"></div>

<div id="topLeftNav" class="top-left-nav" style="display: block;">
    <button class="top-nav-btn" onclick="resetToMainMenu()">↩️ 返回主目錄</button>
</div>

<div id="topRightNav" class="top-right-nav">
    <button class="top-nav-btn logout-btn-text" onclick="logoutSession()">🚪 登出</button>
</div>

<div class="container" id="mainContainer">
    <div id="step1" class="step-panel dashboard-wrapper active">
        <div class="greeting-text" id="welcomeText">請選擇挑戰模式</div>
        <div class="dashboard-grid">
            <div class="dash-btn bg-purple" onclick="switchSetupConfig('CHALLENGE')">
                <div><div class="dash-icon">🎮</div><div class="dash-title">智能闖關模式</div></div>
                <div class="dash-desc">自由選擇題型核心，自動生成關卡與原地補答！</div>
            </div>
            <div class="dash-btn bg-orange" onclick="switchSetupConfig('STATS')">
                <div><div class="dash-icon">🏆</div><div class="dash-title">學習數據報告</div></div>
                <div class="dash-desc">統計各題型正確率與未消滅錯題，支援匯出PDF！</div>
            </div>
            <div class="dash-btn bg-teal" onclick="switchSetupConfig('SOLVER')">
                <div><div class="dash-icon"><i>f(x)</i></div><div class="dash-title">智慧解答模式</div></div>
                <div class="dash-desc">手動輸入算式，系統將提供專屬逐步破譯解說！</div>
            </div>
            <div id="reviewModeCard" class="dash-btn bg-blue" onclick="switchSetupConfig('REVIEW')">
                <div><div class="dash-icon">🗂️</div><div class="dash-title" id="reviewTitle">錯題溫習 (還剩 0 題)</div></div>
                <div class="dash-desc">重溫核心錯題，答對即可從本機消滅！</div>
            </div>
        </div>
    </div>

    <div id="step1_challenge" class="step-panel">
        <h2>🎮 闖關模式設定</h2>
        <div class="form-group">
            <label>🧭 代數核心機制：</label>
            <div class="radio-group">
                <label><input type="radio" name="gameEngine" value="SIMPLIFY" checked onchange="onGameEngineChange()"> 🔮 1. 多項式化簡</label>
                <label><input type="radio" name="gameEngine" value="MULTIPLY" onchange="onGameEngineChange()"> 📐 2. 多項式展開</label>
            </div>
        </div>
        <div class="form-group"><label>🎯 子題型結構：</label><select id="typeSelect"></select></div>
        <button onclick="initChallengeSession()" class="screenshot-btn">🎲 建立關卡，出發！</button>
    </div>

    <div id="step1_solver" class="step-panel">
        <h2>🛠️ 智慧解答模式</h2>
        <div class="form-group"><label>✏️ 請輸入多項式算式：</label><input type="text" id="eqInput" placeholder="例如：(3x+2)-(x-5)"></div>
        <button onclick="handleManualSolverInput()" class="screenshot-btn">開始逐步教學引導</button>
    </div>

    <div id="step2" class="step-panel">
        <h2>請計算化簡以下多項式</h2>
        <div class="stage-box" id="displayEq"></div>
        <div class="form-group"><label>你的最終結果：</label><input type="text" id="ansInput" placeholder="例如: 2x+5"></div>
        <button id="submitAnsBtn" onclick="checkFirstAnswer()">提交結果並驗證</button>
    </div>

    <div id="step3" class="step-panel">
        <h2>多項式逐步分解思維</h2>
        <div class="stage-box" id="interactiveStageBox"></div>
        <div class="teaching-row">
            <div class="teaching-column">
                <h3>📝 步驟動態黑板</h3>
                <div class="math-step-box" id="mathStepBox"></div>
            </div>
        </div>
        <button id="nextBtn" class="btn-success" onclick="advanceQuestion()" style="display:none;margin-top:20px;">前進下一題 ➡️</button>
    </div>

    <div id="step_stats_panel" class="step-panel">
        <h2>📊 學生歷程練習數據報告</h2>
        <div id="printOutputRenderZone">
            <div class="print-student-page">
                <h3>多項式學生成績結算</h3>
                <p>化簡與展開綜合練習完成度：100%</p>
            </div>
        </div>
        <div class="btn-group" style="display:flex;gap:15px;margin-top:20px;">
            <button onclick="window.print()" class="btn-info">🖨️ 匯出 PDF</button>
            <button class="btn-secondary" onclick="resetToMainMenu()">↩️ 返回主目錄</button>
        </div>
    </div>
</div>

<script>
    let currentRole = "";
    let session = { questionList: [], currentIdx: 0 };
    let mockEquation = "(3x + 2) - (x - 5)";

    // 🎯 修正後的顯示面板函數：確保在 step1 (模式選擇介面) 也絕對顯示返回鍵
    function showPanel(id) { 
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active')); 
        const targetPanel = document.getElementById(id);
        if (targetPanel) {
            targetPanel.classList.add('active'); 
        }
        
        // 修正：不論在哪個面板，左上角返回主目錄鍵永遠維持顯示狀態
        document.getElementById('topLeftNav').style.display = 'block'; 
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    }

    function switchSetupConfig(mode) {
        if (mode === 'CHALLENGE') {
            onGameEngineChange();
            showPanel('step1_challenge');
        } else if (mode === 'SOLVER') {
            showPanel('step1_solver');
        } else if (mode === 'STATS') {
            showPanel('step_stats_panel');
        } else if (mode === 'REVIEW') {
            alert("錯題本暫無快照！");
        }
    }

    function onGameEngineChange() {
        let eng = document.querySelector('input[name="gameEngine"]:checked').value;
        let select = document.getElementById('typeSelect');
        if (eng === 'SIMPLIFY') {
            select.innerHTML = `<option value="1">(ax+b)+(cx+d)</option><option value="3">(ax+b)-(cx+d)</option>`;
        } else {
            select.innerHTML = `<option value="1">(ax+b)(cx+d)</option><option value="4">單項式型態展開</option>`;
        }
    }

    function initChallengeSession() {
        session.questionList = [mockEquation];
        session.currentIdx = 0;
        loadPolynomialToStage();
    }

    function handleManualSolverInput() {
        let val = document.getElementById('eqInput').value || mockEquation;
        session.questionList = [val];
        session.currentIdx = 0;
        loadPolynomialToStage();
    }

    function loadPolynomialToStage() {
        document.getElementById('displayEq').innerText = session.questionList[session.currentIdx];
        showPanel('step2');
    }

    function checkFirstAnswer() {
        let ans = document.getElementById('ansInput').value;
        showPanel('step3');
        document.getElementById('interactiveStageBox').innerText = `最簡答案展示`;
        document.getElementById('mathStepBox').innerHTML = `<div>題目：${session.questionList[session.currentIdx]}</div><div>輸入：${ans}</div>`;
        document.getElementById('nextBtn').style.display = "block";
    }

    function advanceQuestion() {
        switchSetupConfig('STATS');
    }

    function resetToMainMenu() { window.location.href = "home.html"; }
    function logoutSession() { localStorage.clear(); window.location.href = "index.html"; }

    (function init() {
        currentRole = localStorage.getItem("Active_User_Role") || "GUEST";
        document.getElementById('topCenterAccount').innerText = `挑戰者: ${currentRole}`;
    })();
</script>
</body>
</html>
